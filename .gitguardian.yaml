version: 2

secret:
  ignored-matches:
    # False positive: "adoptSession" is a useCallback function name in
    # AuthContext.jsx that stores the JWT token pair returned by the API at
    # runtime. The Generic Password detector matched it against the many
    # `password` parameter names in that file. No secret is hardcoded.
    - name: AuthContext adoptSession (function name, not a secret)
      match: adoptSession
