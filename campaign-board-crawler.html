<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Auditor | Overdue Crawler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --muted: #94a3b8;
            --text: #f8fafc;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.6;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 40px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            font-size: 24px;
            background: linear-gradient(135deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            padding: 24px 40px;
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        #step-results {
            flex: 1;
            min-height: 0; /* Important for flex child overflow */
        }

        .step-num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: var(--bg);
            border-radius: 50%;
            font-size: 12px;
            font-weight: 700;
            margin-right: 12px;
        }

        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: inline-block;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-family: inherit;
        }

        .btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            max-height: 400px;
            overflow-y: auto;
            padding: 8px;
            margin-top: 16px;
        }

        .folder-item {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .folder-item.selected {
            background: var(--primary-glow);
            border-color: var(--primary);
        }

        .progress-bar {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
            margin: 24px 0 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            width: 0%;
            transition: width 0.3s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
        }

        .stat-card.active {
            background: var(--primary-glow);
            border-color: var(--primary);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .stat-card.active[data-status="overdue"] {
            background: rgba(239, 68, 68, 0.15);
            border-color: var(--danger);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }

        .stat-card.active[data-status="soon"] {
            background: rgba(245, 158, 11, 0.15);
            border-color: var(--warning);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }

        .stat-card.active[data-status="2w"] {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }

        .stat-val {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .stat-lbl {
            font-size: 11px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
        }

        .table-container {
            width: 100%;
            overflow: auto;
            border-radius: 8px;
            border: 1px solid var(--border);
            flex: 1;
            min-height: 0;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: left;
        }

        th {
            background: var(--surface);
            padding: 16px;
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .item-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-overdue {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .tag-soon {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .tag-2w {
            background: rgba(56, 189, 248, 0.15);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .filter-chips {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }

        .chip {
            padding: 6px 12px;
            border-radius: 20px;
            background: var(--glass);
            border: 1px solid var(--border);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted);
        }

        .chip.active {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
        }

        .loading-spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            width: 14px;
            height: 14px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }

        /* Filter Bar Styles */
        .filter-bar {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-input {
            flex: 1;
            min-width: 200px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text);
            font-size: 13px;
        }

        .sortable {
            cursor: pointer;
            user-select: none;
            padding-right: 20px !important;
        }

        .sortable:hover {
            color: var(--primary);
        }

        .sortable::after {
            content: '↕';
            position: absolute;
            right: 8px;
            opacity: 0.3;
        }

        .sortable.asc::after {
            content: '↑';
            opacity: 1;
            color: var(--primary);
        }

        .sortable.desc::after {
            content: '↓';
            opacity: 1;
            color: var(--primary);
        }

        .person-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
        }

        /* Board Group Headers */
        .board-group-header {
            background: rgba(255, 255, 255, 0.03) !important;
            cursor: pointer;
            user-select: none;
            transition: background 0.2s;
        }

        .board-group-header:hover {
            background: rgba(255, 255, 255, 0.06) !important;
        }

        .board-group-header td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            color: var(--primary);
        }

        .board-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .board-chevron {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--muted);
            width: 14px;
        }

        .is-collapsed .board-chevron {
            transform: rotate(-90deg);
        }

        .board-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 4px;
            display: inline-flex;
            align-items: center;
        }

        .board-tag.overdue {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .board-tag.soon {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .board-tag.v2w {
            background: rgba(56, 189, 248, 0.15);
            color: var(--primary);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        .folder-sub {
            font-size: 10px;
            color: var(--muted);
            font-weight: 400;
            margin-left: 4px;
        }

        /* Loading Toast */
        #loading-toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid var(--primary);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            z-index: 2000;
            transform: translateY(150px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 320px;
        }

        #loading-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast-content {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }

        #loading-toast .progress-bar {
            margin: 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
        }

        #loading-toast #progress-text {
            font-size: 11px;
            margin: 0;
        }
    </style>
</head>

<body>
    <header>
        <div class="brand"><span class="logo-icon">🔍</span>
            <h1>Campaign Auditor</h1>
        </div>
    </header>
    <div class="container">
        <div id="error-message"></div>
        <div class="card" id="step-auth">
            <span class="step-num">1</span>
            <h2>Connect</h2>
            <div class="input-group">
                <label>API v2 Token</label>
                <input type="password" id="api-key" placeholder="Paste ey... key">
            </div>
            <button class="btn" onclick="connectMonday()">Connect to Monday.com</button>
        </div>
        <div class="card" id="step-folders" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div><span class="step-num">2</span>
                    <h2>Select Folders</h2>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 11px;"
                        onclick="toggleAllFolders(true)">All</button>
                    <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 11px;"
                        onclick="toggleAllFolders(false)">None</button>
                </div>
            </div>
            <div class="folder-grid" id="folder-list"></div>
            <div style="margin-top: 32px; display: flex; justify-content: space-between; align-items: center;">
                <div id="selection-summary" style="font-size: 13px; font-weight: 600; color: var(--primary);">0 boards selected for audit</div>
                <button class="btn" id="crawl-btn" onclick="startAudit()" disabled>Start Audit</button>
            </div>
        </div>
        <div class="card" id="step-results" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div style="display: flex; align-items: center;">
                    <span class="step-num">3</span>
                    <h2 style="margin: 0;">Audit Results</h2>
                </div>
            </div>
            
            <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));">
                <div class="stat-card" data-status="all" onclick="setStatusFilter('all')">
                    <div class="stat-val" id="stat-boards">0</div>
                    <div class="stat-lbl">Boards</div>
                </div>
                <div class="stat-card" data-status="overdue" onclick="setStatusFilter('overdue')">
                    <div class="stat-val" id="stat-overdue" style="color: var(--danger);">0</div>
                    <div class="stat-lbl">Overdue</div>
                </div>
                <div class="stat-card" data-status="soon" onclick="setStatusFilter('soon')">
                    <div class="stat-val" id="stat-soon" style="color: var(--warning);">0</div>
                    <div class="stat-lbl">Due Soon</div>
                </div>
                <div class="stat-card" data-status="2w" onclick="setStatusFilter('2w')">
                    <div class="stat-val" id="stat-2w" style="color: var(--primary);">0</div>
                    <div class="stat-lbl">Due 2 Weeks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val" id="stat-items">0</div>
                    <div class="stat-lbl">Items Scanned</div>
                </div>
            </div>
            <div id="results-controls" style="display: none; margin-top: 32px;">
                <div class="filter-bar">
                    <div
                        style="color: var(--muted); font-size: 11px; text-transform: uppercase; font-weight: 700; width: 100%; display: flex; justify-content: space-between; align-items: center;">
                        <span>Filters (Item Search)</span>
                    </div>
                    <div style="display: flex; gap: 16px; width: 100%;">
                        <input type="text" id="filter-text" class="filter-input" placeholder="Search by item or board..."
                            oninput="updateFilteredUI()">
                        <input type="text" id="filter-person" class="filter-input" placeholder="Filter by person..."
                            oninput="updateFilteredUI()">
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th class="sortable" onclick="handleSort('name')" id="sort-name">Item Name</th>
                                <th class="sortable" onclick="handleSort('person')" id="sort-person">Person</th>
                                <th class="sortable" onclick="handleSort('deadline')" id="sort-deadline"
                                    style="text-align: center;">Deadline</th>
                                <th class="sortable" onclick="handleSort('daysOverdue')" id="sort-daysOverdue"
                                    style="text-align: center;">Overdue</th>
                                <th>Board / Folder</th>
                                <th style="text-align: right;">Status</th>
                            </tr>
                        </thead>
                        <tbody id="results-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="loading-toast">
        <div class="toast-header">
            <div class="loading-spinner"></div>
            <div class="toast-content" id="toast-text">Fetching data...</div>
        </div>
        <div class="progress-bar" id="toast-progress-container" style="display: none;">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div id="progress-text" style="display: none; color: var(--muted);">Initializing...</div>
    </div>

    <script>
        const LAMBDA = "https://1rxrp7gth2.execute-api.ap-southeast-1.amazonaws.com/monday";
        let state = {
            apiKey: localStorage.getItem('monday_api_key') || '',
            slug: '', folders: [], selectedFolderIds: new Set(), auditedItems: [],
            stats: { boardsAudited: 0, totalItems: 0, overdueTotal: 0, soonTotal: 0, v2wTotal: 0 },
            sort: { key: 'deadline', dir: 'asc' },
            filters: { text: '', person: '', status: 'all' },
            expandedBoardIds: new Set()
        };

        window.onload = () => { if (state.apiKey) { document.getElementById('api-key').value = state.apiKey; connectMonday(); } };

        async function monday(query, variables = {}) {
            showToast("Connecting to Monday...");
            try {
                const r = await fetch(LAMBDA, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'get_monday_data', query, variables, api_key: state.apiKey }) });
                const res = await r.json();
                const data = typeof res.body === 'string' ? JSON.parse(res.body) : (res.body || res);
                if (data.errors) throw new Error(data.errors[0].message);
                if (data.error) throw new Error(data.error);
                return data.data || data;
            } finally {
                hideToast();
            }
        }

        async function connectMonday() {
            const btn = document.querySelector('#step-auth .btn');
            const key = document.getElementById('api-key').value.trim();
            if (!key) return;
            try {
                btn.disabled = true; btn.innerHTML = '<div class="loading-spinner"></div> Connecting...';
                state.apiKey = key; localStorage.setItem('monday_api_key', key);

                const acc = await monday(`query { account { slug } }`);
                state.slug = acc.account?.slug || 'my';

                let allBoards = [], page = 1, hasMore = true;

                while (hasMore) {
                    try {
                        const bdata = await monday(`query($p:Int){ boards(limit:100, page:$p, state:active){ id name type folder{id name} workspace{name} } }`, { p: page });
                        console.log("Page " + page + " Result:", bdata);

                        const boards = bdata.boards || (bdata.data && bdata.data.boards);

                        if (!boards || boards.length === 0) {
                            hasMore = false;
                        } else {
                            allBoards = allBoards.concat(boards);
                            hasMore = boards.length === 100;
                            page++;
                        }
                    } catch (err) {
                        console.error("Pagination error at page " + page, err);
                        hasMore = false;
                    }
                }

                if (allBoards.length === 0) {
                    throw new Error("No boards found. If you have boards, please check your API permissions.");
                }
                const folderMap = {};
                allBoards.forEach(b => {
                    if (b.type !== 'board' && b.type !== 'public') return; // Ensure we only get real boards
                    const f = b.folder || { id: 'root-' + (b.workspace?.name || 'Main'), name: b.workspace?.name || 'Main' };
                    if (!folderMap[f.id]) folderMap[f.id] = { id: f.id, name: f.name, boards: [], ws: b.workspace?.name };
                    folderMap[f.id].boards.push(b);
                });

                state.folders = Object.values(folderMap).sort((a, b) => a.name.localeCompare(b.name));

                // Pre-select default folders
                const defaults = ['9. PSG Campaigns', 'SaaS SEO Campaign', '9. Regular Campaigns', 'PSG V3 Campaigns'];
                state.folders.forEach(f => {
                    if (defaults.includes(f.name)) state.selectedFolderIds.add(f.id);
                });

                renderFolders();
                document.getElementById('step-auth').style.display = 'none';
                document.getElementById('step-folders').style.display = 'block';
            } catch (e) { showError(e.message); btn.disabled = false; btn.innerHTML = 'Connect'; }
        }

        function renderFolders() {
            const list = document.getElementById('folder-list');
            list.innerHTML = state.folders.map(f => `
                <div class="folder-item ${state.selectedFolderIds.has(f.id) ? 'selected' : ''}" onclick="toggleFolder('${f.id}')">
                    <input type="checkbox" ${state.selectedFolderIds.has(f.id) ? 'checked' : ''} style="accent-color:var(--primary)">
                    <div class="folder-info"><div class="folder-name">${f.name}</div><div class="folder-meta">${f.boards.length} boards • ${f.ws || 'Workspace'}</div></div>
                </div>
            `).join('');
            
            // Calculate total boards
            let total = 0;
            state.selectedFolderIds.forEach(id => {
                const f = state.folders.find(x => x.id === id);
                if (f) total += f.boards.length;
            });
            document.getElementById('selection-summary').innerText = `${total} boards selected for audit`;
            document.getElementById('crawl-btn').disabled = state.selectedFolderIds.size === 0;
        }

        function toggleFolder(id) {
            if (state.selectedFolderIds.has(id)) state.selectedFolderIds.delete(id);
            else state.selectedFolderIds.add(id);
            renderFolders();
        }

        function toggleAllFolders(val) {
            if (val) state.folders.forEach(f => state.selectedFolderIds.add(f.id));
            else state.selectedFolderIds.clear();
            renderFolders();
        }

        async function startAudit() {
            const queue = [];
            state.selectedFolderIds.forEach(fid => { const f = state.folders.find(x => x.id === fid); f.boards.forEach(b => { if (!queue.find(q => q.id === b.id)) queue.push({ ...b, folderName: f.name }); }); });
            document.getElementById('step-folders').style.display = 'none';
            document.getElementById('step-results').style.display = 'flex';
            
            // Setup toast for persistent auditing
            showToast("Starting audit...");
            document.getElementById('toast-progress-container').style.display = 'block';
            document.getElementById('progress-text').style.display = 'block';
            toastCount = 999; // Lock toast open

            let finished = 0, total = queue.length;
            async function work() {
                while (queue.length > 0) {
                    const b = queue.shift();
                    try {
                        let bItems = [], cursor = null;
                        do {
                            const idata = await monday(`query($id:[ID!],$c:String){ 
                                boards(ids:$id){ 
                                    items_page(limit:100,cursor:$c){ 
                                        cursor 
                                        items { 
                                            id 
                                            name 
                                            column_values { 
                                                id
                                                text
                                                type
                                                ...on StatusValue{label} 
                                                ...on DateValue{date} 
                                                ...on TimelineValue{from to} 
                                            } 
                                        } 
                                    } 
                                } 
                            }`, { id: [b.id], c: cursor });
                            const p = idata.boards?.[0]?.items_page;
                            if (!p) {
                                console.warn(`Could not retrieve items for board ${b.id}. Full response:`, idata);
                                break;
                            }
                            bItems = bItems.concat(p.items);
                            cursor = p.cursor;
                        } while (cursor);

                        const qualified = bItems.filter(i => {
                            const done = ['Done', 'Completed', 'Finished', 'Approved'].some(l => i.column_values.some(cv => cv.label === l));
                            if (done) return false;
                            const dv = i.column_values.find(cv => cv.date || cv.to);
                            if (!dv) return false;
                            const due = new Date(dv.date || dv.to).getTime();
                            const limit = new Date().getTime() + (14 * 24 * 60 * 60 * 1000); // 14 days from now
                            return due < limit;
                        });

                        state.auditedItems = state.auditedItems.concat(qualified.map(i => {
                            const dv = i.column_values.find(cv => cv.date || cv.to);
                            const assigned = i.column_values.find(cv => cv.type === 'people' || cv.type === 'multiple-person');
                            
                            const today = new Date().setHours(0, 0, 0, 0);
                            const due = dv ? new Date(dv.date || dv.to) : null;
                            const diffDays = due ? Math.floor((today - due.getTime()) / (1000 * 60 * 60 * 24)) : 0;
                            
                            let status = 'overdue';
                            if (diffDays <= 0) {
                                if (diffDays >= -7) status = 'soon';
                                else status = '2w';
                            }

                            if (status === 'overdue') state.stats.overdueTotal++;
                            else if (status === 'soon') state.stats.soonTotal++;
                            else state.stats.v2wTotal++;

                            let dateDisplay = 'No Date';
                            if (dv) {
                                const from = dv.from ? new Date(dv.from).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '';
                                const to = new Date(dv.date || dv.to).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                                dateDisplay = from ? `${from} - ${to}` : to;
                            }

                            return {
                                ...i,
                                bName: b.name,
                                fName: b.folderName,
                                bId: b.id,
                                deadline: dv ? (dv.date || dv.to) : null,
                                deadlineDisplay: dateDisplay,
                                daysOverdue: diffDays,
                                person: assigned?.text || 'Unassigned',
                                status: status
                            };
                        }));
                        state.stats.boardsAudited++; state.stats.totalItems += bItems.length;
                    } catch (e) {
                        console.error(e);
                        state.stats.boardsAudited++; // Still count as 'audited' (even if failed) for the counter
                    }
                    updateUI(Math.round((++finished / total) * 100));
                }
            }
            await Promise.all(Array(5).fill(0).map(work));
            
            toastCount = 0; // Unlock toast
            hideToast();
            setTimeout(() => {
                document.getElementById('toast-progress-container').style.display = 'none';
                document.getElementById('progress-text').style.display = 'none';
            }, 3000); // Hide progress bar after 3 seconds
        }

        function updateUI(pct) {
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-text').innerText = pct < 100 ? `Auditing... ${state.stats.boardsAudited} boards complete` : 'Audit Complete!';
            document.getElementById('stat-boards').innerText = state.stats.boardsAudited;
            document.getElementById('stat-overdue').innerText = state.stats.overdueTotal;
            document.getElementById('stat-soon').innerText = state.stats.soonTotal;
            document.getElementById('stat-2w').innerText = state.stats.v2wTotal;
            document.getElementById('stat-items').innerText = state.stats.totalItems.toLocaleString();

            if (state.auditedItems.length > 0) {
                const controls = document.getElementById('results-controls');
                controls.style.display = 'flex';
                controls.style.flexDirection = 'column';
                controls.style.flex = '1';
                controls.style.minHeight = '0';
                controls.style.gap = '16px';
                updateFilteredUI();
            }
            
            // Sync active state of cards
            document.querySelectorAll('.stat-card').forEach(c => {
                c.classList.toggle('active', c.dataset.status === state.filters.status);
            });
        }

        function setStatusFilter(val) {
            if (state.filters.status === val && val !== 'all') state.filters.status = 'all';
            else state.filters.status = val;
            
            updateUI(100); // Trigger UI refresh to update active classes
            updateFilteredUI();
        }

        let toastCount = 0;
        function showToast(text) {
            toastCount++;
            const t = document.getElementById('loading-toast');
            document.getElementById('toast-text').innerText = text || 'Processing...';
            t.classList.add('show');
        }

        function hideToast() {
            toastCount--;
            if (toastCount <= 0) {
                toastCount = 0;
                document.getElementById('loading-toast').classList.remove('show');
            }
        }

        function handleSort(key) {
            if (state.sort.key === key) state.sort.dir = state.sort.dir === 'asc' ? 'desc' : 'asc';
            else { state.sort.key = key; state.sort.dir = 'asc'; }

            // Update UI indicators
            ['name', 'person', 'deadline', 'daysOverdue'].forEach(k => {
                const el = document.getElementById('sort-' + k);
                if (el) {
                    el.classList.remove('asc', 'desc');
                    if (k === key) el.classList.add(state.sort.dir);
                }
            });

            updateFilteredUI();
        }

        function updateFilteredUI() {
            const queryText = document.getElementById('filter-text').value.toLowerCase();
            const queryPerson = document.getElementById('filter-person').value.toLowerCase();

            let filtered = state.auditedItems.filter(i => {
                const matchesText = i.name.toLowerCase().includes(queryText) || i.bName.toLowerCase().includes(queryText);
                const matchesPerson = (i.person || '').toLowerCase().includes(queryPerson);
                const matchesStatus = state.filters.status === 'all' || i.status === state.filters.status;
                return matchesText && matchesPerson && matchesStatus;
            });

            // Group by Board
            const groups = {};
            filtered.forEach(i => {
                if (!groups[i.bId]) groups[i.bId] = { id: i.bId, name: i.bName, folder: i.fName, items: [], counts: { overdue: 0, soon: 0, v2w: 0 } };
                groups[i.bId].items.push(i);
                groups[i.bId].counts[i.status === '2w' ? 'v2w' : i.status]++;
            });

            // Sort groups by Board Name
            const sortedGroups = Object.values(groups).sort((a, b) => a.name.localeCompare(b.name));

            // Sort items within groups
            sortedGroups.forEach(g => {
                g.items.sort((a, b) => {
                    let vA = a[state.sort.key] || '', vB = b[state.sort.key] || '';
                    if (state.sort.key === 'deadline') {
                        vA = vA ? new Date(vA).getTime() : 0;
                        vB = vB ? new Date(vB).getTime() : 0;
                    }
                    return state.sort.dir === 'asc' ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
                });
            });

            const body = document.getElementById('results-table-body');
            let html = '';

            sortedGroups.forEach(g => {
                const isExpanded = state.expandedBoardIds.has(g.id);
                
                // Group Header
                html += `
                <tr class="board-group-header ${!isExpanded ? 'is-collapsed' : ''}" onclick="toggleBoardExpansion('${g.id}')">
                    <td colspan="6">
                        <div class="board-info">
                            <i class="fas fa-chevron-down board-chevron"></i>
                            <span>${g.name} <span class="folder-sub">in ${g.folder}</span></span>
                            <div style="display: flex; gap: 4px; margin-left: 12px;">
                                ${g.counts.overdue > 0 ? `<span class="board-tag overdue">${g.counts.overdue} Overdue</span>` : ''}
                                ${g.counts.soon > 0 ? `<span class="board-tag soon">${g.counts.soon} Soon</span>` : ''}
                                ${g.counts.v2w > 0 ? `<span class="board-tag v2w">${g.counts.v2w} 2W</span>` : ''}
                            </div>
                        </div>
                    </td>
                </tr>
                `;

                if (isExpanded) {
                    g.items.forEach(i => {
                        let tagClass = 'tag-overdue';
                        let tagLabel = 'Overdue';
                        let daysColor = 'var(--danger)';

                        if (i.status === 'soon') {
                            tagClass = 'tag-soon';
                            tagLabel = 'Due Soon';
                            daysColor = 'var(--warning)';
                        } else if (i.status === '2w') {
                            tagClass = 'tag-2w';
                            tagLabel = 'Due 2W';
                            daysColor = 'var(--primary)';
                        }

                        html += `
                        <tr class="item-row">
                            <td><a href="https://${state.slug}.monday.com/boards/${i.bId}/pulses/${i.id}" target="_blank" class="item-link">${i.name} <i class="fas fa-external-link-alt" style="font-size:0.8em"></i></a></td>
                            <td><div class="person-badge"><i class="far fa-user"></i> ${i.person}</div></td>
                            <td style="text-align: center; color: var(--muted); font-family: monospace;">${i.deadlineDisplay}</td>
                            <td style="text-align: center; font-weight: 700; color: ${daysColor}">${i.daysOverdue > 0 ? i.daysOverdue + 'd' : '-'}</td>
                            <td style="color: var(--muted); font-size: 11px;">${i.bName}</td>
                            <td style="text-align: right;"><span class="${tagClass}">${tagLabel}</span></td>
                        </tr>
                        `;
                    });
                }
            });

            body.innerHTML = html;
        }

        function toggleBoardExpansion(bId) {
            if (state.expandedBoardIds.has(bId)) state.expandedBoardIds.delete(bId);
            else state.expandedBoardIds.add(bId);
            updateFilteredUI();
        }

        function showError(m) { const e = document.getElementById('error-message'); e.innerText = m; e.style.display = m ? 'block' : 'none'; }
    </script>
</body>

</html>
