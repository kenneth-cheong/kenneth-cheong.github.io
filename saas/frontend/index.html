<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%234f46e5'/%3E%3Ctext x='16' y='23' font-family='Arial,sans-serif' font-size='20' font-weight='700' fill='white' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E" />
    <title>Digimetrics — SEO & AI Visibility Toolkit</title>
    <meta name="description" content="SEO, AI content and AI-visibility tools for solo marketers — keyword research, rank tracking, content optimisation and your own Google data in one workspace." />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#4f46e5" />
    <!-- Installable web app (add-to-home / standalone). Icons + manifest live in public/. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Digimetrics" />
    <!-- Open Graph / Twitter card -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Digimetrics" />
    <meta property="og:title" content="Digimetrics — SEO & AI Visibility Toolkit" />
    <meta property="og:description" content="SEO, AI content and AI-visibility tools for solo marketers, in one workspace." />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Digimetrics — SEO & AI Visibility Toolkit" />
    <meta name="twitter:description" content="SEO, AI content and AI-visibility tools for solo marketers, in one workspace." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter is the royal theme's face (the mockup is set in it); Plus Jakarta
         Sans stays the light/dark face. Both are fetched in one request. -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Apply the saved theme BEFORE first paint so there's no flash of the
         wrong canvas on load. Mirrors src/lib/theme.js: 'dm:theme' =
         royal | light | dark | system (default royal). Kept inline + tiny so it
         runs synchronously in <head>.
         CSP: this script is allow-listed by a sha256 hash in
         public/customHttp.yml AND amplify.yml — recompute both if you edit it
         (see DEPLOY.md), or the theme stops applying pre-paint in production. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('dm:theme') || 'royal';
          var theme = pref === 'system'
            ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : pref;
          var cl = document.documentElement.classList;
          cl.toggle('dark', theme === 'dark' || theme === 'royal');
          cl.toggle('royal', theme === 'royal');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
