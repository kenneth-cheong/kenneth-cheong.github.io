    <!-- Apply the saved theme BEFORE first paint so there's no light-mode flash
         on load. Mirrors src/lib/theme.js: 'dm:theme' = light | dark | system
         (default system). Kept inline + tiny so it runs synchronously in <head>. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('dm:theme') || 'system';
          var dark = pref === 'dark' || (pref === 'system' &&
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>

    <script type="module" src="/src/main.jsx"></script>
