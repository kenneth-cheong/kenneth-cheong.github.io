# Amplify custom response headers for MANUAL (zip) deployments.
#
# amplify.yml `customHeaders` only applies to Amplify-run builds; this app is
# published via deploy.sh (zip upload), which skips the build phase. Amplify
# reads this file from the artifact root instead. Vite copies public/* → dist/,
# so it lands at the zip root. Keep this in sync with amplify.yml.
#
# CSP rationale: script-src has NO 'unsafe-inline' (blocks injected <script> —
# the main vector for stealing the localStorage JWTs); style-src/img-src stay
# permissive because tool reports render inline-styled HTML with arbitrary images.
customHeaders:
  - pattern: '**'
    headers:
      - key: 'Strict-Transport-Security'
        value: 'max-age=63072000; includeSubDomains; preload'
      - key: 'X-Content-Type-Options'
        value: 'nosniff'
      - key: 'X-Frame-Options'
        value: 'DENY'
      - key: 'Referrer-Policy'
        value: 'strict-origin-when-cross-origin'
      - key: 'Permissions-Policy'
        value: 'geolocation=(), microphone=(), camera=(), payment=()'
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.execute-api.ap-southeast-1.amazonaws.com https://*.lambda-url.ap-southeast-1.on.aws https://accounts.google.com; frame-src 'self' https://accounts.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://accounts.google.com; object-src 'none'"
      # index.html (served at every SPA route) must revalidate so a redeploy's
      # new chunk hashes are picked up — otherwise a cached HTML points at
      # deleted /assets/*.js chunks → "failed to fetch module" → blank page.
      - key: 'Cache-Control'
        value: 'no-cache'
  # Hashed build assets are content-addressed and safe to cache forever. This
  # more-specific pattern overrides the no-cache above for /assets/* only.
  - pattern: '/assets/**'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
