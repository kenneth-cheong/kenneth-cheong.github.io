AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Digimetrics SaaS backend — auth, metering gateway, credits, Stripe billing.

Parameters:
  AppOrigin:
    Type: String
    Description: Canonical frontend origin for redirects (Stripe/email links). Single value.
    Default: http://localhost:5173
  CorsOrigins:
    Type: CommaDelimitedList
    Description: Allowed browser origins for CORS (custom domain + Amplify URL). Superset of AppOrigin.
    Default: http://localhost:5173
  GoogleClientId:
    Type: String
  # JwtSecret, StripeSecretKey, StripeWebhookSecret, GatewaySecret and
  # GoogleAdsDeveloperToken were migrated to Secrets Manager (digimetrics-saas/*)
  # and are now referenced via {{resolve:secretsmanager:...}} dynamic references —
  # no longer plaintext CFN parameters.
  AdminEmails:
    Type: String
    Default: tom@mediaone.co,june@mediaone.co,kenneth@mediaone.co
    Description: Comma-separated allowlist of admin emails (access to /admin/*).
  AmplifyAppId:
    Type: String
    Default: d1q0hza133u0y9
    Description: Amplify Hosting app id backing the frontend (Admin → Platform usage).
  AmplifyDomain:
    Type: String
    Default: digimetrics.ai
    Description: Amplify custom domain used for access-log exports (Admin → Platform).
  AmplifyBranch:
    Type: String
    Default: main
    Description: Amplify branch whose build/deploy activity is reported.
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: Google OAuth client secret (for GSC / GA4 / Ads integrations).
  GoogleAdsLoginCustomerId:
    Type: String
    Default: ''
    Description: Google Ads manager (MCC) login-customer-id used for Ads API calls.
  SesFrom:
    Type: String
    Default: ''
    Description: Verified SES "from" address for ticket emails (empty disables email).
  SesSupport:
    Type: String
    Default: ''
    Description: Inbox alerted when a user opens/replies to a ticket.
  SmtpUser:
    Type: String
    Default: ''
    Description: >-
      SMTP login for agreement notifications (a Google Workspace mailbox, e.g.
      noreply@mediaone.co). Gmail forces the From header to match this mailbox,
      so it must be the @mediaone.co address you want mail to come from. Empty
      disables SMTP and falls back to SES.
  SmtpFrom:
    Type: String
    Default: ''
    Description: From header for SMTP mail (display-name form ok). Defaults to SmtpUser when empty.
  SmtpHost:
    Type: String
    Default: smtp.gmail.com
    Description: SMTP server host.
  SmtpPort:
    Type: String
    Default: '587'
    Description: SMTP port (587 STARTTLS, 465 implicit TLS).
  AutoCloseDays:
    Type: String
    Default: '7'
    Description: Days of inactivity before a support ticket auto-closes.
  AlarmEmail:
    Type: String
    Default: ''
    Description: Email alerted when a Lambda starts erroring/throttling (empty disables notifications; alarms still fire to the console).

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 30
    Architectures: [arm64]
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        LEDGER_TABLE: !Ref LedgerTable
        RUNS_TABLE: !Ref RunsTable
        TICKETS_TABLE: !Ref TicketsTable
        NOTIFICATIONS_TABLE: !Ref NotificationsTable
        PROJECTS_TABLE: !Ref ProjectsTable
        CACHE_TABLE: !Ref CacheTable
        TRACKED_TABLE: !Ref TrackedTable
        METRICS_TABLE: !Ref MetricsTable
        CONVERSATIONS_TABLE: !Ref ConversationsTable
        SHARES_TABLE: !Ref SharesTable
        SCHEDULES_TABLE: !Ref SchedulesTable
        APP_ORIGIN: !Ref AppOrigin
        JWT_SECRET: '{{resolve:secretsmanager:digimetrics-saas/jwt-secret:SecretString}}'

Resources:
  # ── Data ────────────────────────────────────────────────────────────────
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: stripeCustomerId, AttributeType: S }
        - { AttributeName: emailLower, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: stripeCustomerIndex
          KeySchema:
            - { AttributeName: stripeCustomerId, KeyType: HASH }
          Projection: { ProjectionType: ALL }
        # Look up an account by normalized email — email/password sign-in,
        # forgot-password, and Google↔password account linking.
        - IndexName: emailIndex
          KeySchema:
            - { AttributeName: emailLower, KeyType: HASH }
          Projection: { ProjectionType: ALL }

  LedgerTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: ts, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: ts, KeyType: RANGE }

  # Saved tool runs (re-openable history). SK is time-first so newest sorts top.
  RunsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: runId, AttributeType: S }
        - { AttributeName: scheduleId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: runId, KeyType: RANGE }
      # SPARSE index: only schedule-driven runs carry `scheduleId`, so this holds
      # just those — the per-schedule run history for period-over-period compare.
      GlobalSecondaryIndexes:
        - IndexName: scheduleIndex
          KeySchema:
            - { AttributeName: scheduleId, KeyType: HASH }
            - { AttributeName: runId, KeyType: RANGE }
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes: [ts, preview, target, creditsUsed, tool, toolName, projectId]

  # Recurring tool-run schedules (userId#PK, scheduleId#SK). Each row is "run
  # tool X with these saved inputs on this cadence"; the hourly SchedulesCronFn
  # scans for due rows and fires them through the metering gateway.
  SchedulesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: scheduleId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: scheduleId, KeyType: RANGE }

  # Public share links: shareId → {userId, runId}. Auto-expire via TTL so old
  # links don't linger. Public /s/:id resolves a run without the viewer logging in.
  SharesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: shareId, AttributeType: S }
      KeySchema:
        - { AttributeName: shareId, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Support tickets (threaded — messages stored inline on the item).
  TicketsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: ticketId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: ticketId, KeyType: RANGE }

  # Projects — group runs/keywords/integrations by site.
  ProjectsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: projectId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: projectId, KeyType: RANGE }

  # Tracked keywords — rank position history per (project, keyword).
  TrackedTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: trackId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: trackId, KeyType: RANGE }

  # Tool performance metrics — one row per (user, project#tool#metric), each
  # holding a `history` of dated headline values for the Performance charts.
  MetricsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: metricId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: metricId, KeyType: RANGE }

  # Assistant chat conversations — full message thread per (user, conversation).
  ConversationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: conversationId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: conversationId, KeyType: RANGE }

  # Upstream result cache (self-expiring via TTL on `expireAt`).
  CacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: key, AttributeType: S }
      KeySchema:
        - { AttributeName: key, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expireAt
        Enabled: true

  # In-platform notifications (ticket replies, closes, etc.).
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: notifId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: notifId, KeyType: RANGE }

  # Broadcast audit log — one row per admin broadcast (filter, channels, counts).
  # Constant partition key ('broadcast') so the whole history is one ordered query.
  BroadcastsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: pk, AttributeType: S }
        - { AttributeName: broadcastId, AttributeType: S }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
        - { AttributeName: broadcastId, KeyType: RANGE }

  # Ticket attachments (screenshots / files). PRIVATE — objects are served only
  # via short-lived presigned GET URLs the app mints on read (see lib/s3.mjs).
  AttachmentsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      OwnershipControls:
        Rules: [{ ObjectOwnership: BucketOwnerEnforced }]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']

  # ── Secrets ──────────────────────────────────────────────────────────────
  # Backend secrets live in Secrets Manager (digimetrics-saas/<name>), referenced
  # by the function env vars via {{resolve:secretsmanager:...}} dynamic references
  # — no longer plaintext CFN parameters. The secret resources were created by an
  # earlier transitional deploy and kept (DeletionPolicy: Retain), so they're now
  # managed out-of-band. GoogleClientSecret is the lone exception (empty in this
  # deployment → still a plaintext param; migrate it if Google OAuth is enabled).
  # NOTE: a fresh stack deploy must pre-create these 5 secrets first.

  # ── HTTP API + JWT (Lambda) authorizer ──────────────────────────────────
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      # Stage-level throttling — the edge backstop against volumetric floods.
      # Requests beyond these limits get a 429 from API Gateway BEFORE reaching
      # Lambda (so they cost nothing). Set generously: real traffic never trips
      # them; per-user fairness is enforced in-handler (see lib/ratelimit.mjs).
      DefaultRouteSettings:
        ThrottlingBurstLimit: 4000
        ThrottlingRateLimit: 2000
      RouteSettings:
        # The billable tool path gets its own (still generous) ceiling.
        'POST /run/{toolId}':
          ThrottlingBurstLimit: 600
          ThrottlingRateLimit: 300
      CorsConfiguration:
        AllowOrigins: !Ref CorsOrigins
        AllowHeaders: [Content-Type, Authorization]
        AllowMethods: [GET, POST, OPTIONS]
        AllowCredentials: true
      Auth:
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthorizerFn.Arn
            Identity:
              Headers: [Authorization]
            AuthorizerPayloadFormatVersion: '2.0'
            EnableSimpleResponses: true
        # No DefaultAuthorizer → routes are public unless they opt into
        # JwtAuthorizer (auth/webhook stay public; everything else is gated).

  AuthorizerFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/authorizer/
      Handler: index.handler

  # API Gateway must be allowed to invoke the authorizer (SAM doesn't add this
  # for HttpApi Lambda authorizers referenced by ARN — without it every authed
  # route 500s before the function runs).
  AuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthorizerFn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/authorizers/*'

  # ── Auth (public): Google login + token refresh ─────────────────────────
  AuthFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/auth/
      Handler: index.handler
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          ADMIN_EMAILS: !Ref AdminEmails
          # Verified SES sender for email-verification + password-reset mail.
          SES_FROM: !Ref SesFrom
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        # Rate-limit counters live in the Cache table (lib/ratelimit.mjs).
        - DynamoDBCrudPolicy: { TableName: !Ref CacheTable }
        # Send verification + password-reset emails.
        - Statement:
            - Effect: Allow
              Action: ['ses:SendEmail']
              Resource: '*'
      Events:
        Google: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/google, Method: POST } }
        Refresh: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/refresh, Method: POST } }
        Config: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/config, Method: GET } }
        Signup: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/signup, Method: POST } }
        Verify: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/verify, Method: POST } }
        Password: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/password, Method: POST } }
        Forgot: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/forgot, Method: POST } }
        Reset: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/reset, Method: POST } }
        Resend: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/resend, Method: POST } }
        # Public one-click unsubscribe from product-update emails (token-authed).
        Unsubscribe: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /notify/unsubscribe, Method: POST } }

  # ── Profile + usage (authed) ────────────────────────────────────────────
  MeFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/me/
      Handler: index.handler
      Environment:
        Variables:
          ADMIN_EMAILS: !Ref AdminEmails
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref UsersTable }
        - DynamoDBReadPolicy: { TableName: !Ref LedgerTable }
      Events:
        Me: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Usage: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/usage, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }

  # ── Share cards (authed): server-rendered branded PNG of a saved run ────
  # Rasterises the shared SVG generator with resvg-wasm + an embedded brand
  # font, so the card is pixel-identical to the in-app preview. 1024MB gives
  # the WASM render ample CPU (Lambda CPU scales with memory).
  ShareFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/share/
      Handler: index.handler
      MemorySize: 1024
      Environment:
        Variables:
          # Public share links are served from platform.digimetrics.ai via an
          # Amplify /s/* reverse-proxy rewrite (not the raw execute-api host),
          # so social unfurls show the brand domain. (Merged with Globals env.)
          PUBLIC_SHARE_ORIGIN: https://platform.digimetrics.ai
      Policies:
        # CRUD on Runs: read the saved run + stamp the run's public shareId.
        - DynamoDBCrudPolicy: { TableName: !Ref RunsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref SharesTable }
      Events:
        Card: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/me/runs/{runId}/card', Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        ShareCreate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/me/runs/{runId}/share', Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ShareRevoke: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/me/runs/{runId}/share/revoke', Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        # Public (no authorizer): the OG landing page + the redacted card image.
        PublicPage: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/s/{shareId}', Method: GET } }
        PublicCard: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/s/{shareId}/card.png', Method: GET } }

  # ── Metering gateway (authed): the choke point for every tool ───────────
  MeteringFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/metering/
      Handler: index.handler
      # Long timeout for the Function-URL (slow-tool) path; the API-Gateway path
      # is still capped at the platform's 30s regardless. The background Social
      # Audit finalizer (a self-invoked async run) also lives within this budget.
      Timeout: 300
      Environment:
        Variables:
          GATEWAY_SECRET: '{{resolve:secretsmanager:digimetrics-saas/gateway-secret:SecretString}}'
          # Staff allowlist — must match MeFn so a staff member the frontend shows
          # staff-only controls to (e.g. the Content Optimiser's multi-model A/B
          # run) is also recognised as staff by the gateway that enforces it.
          ADMIN_EMAILS: !Ref AdminEmails
          # "Run complete" in-platform notifications + the async Social Audit
          # finalizer write to the notifications table.
          NOTIFICATIONS_TABLE: !Ref NotificationsTable
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_ADS_DEVELOPER_TOKEN: '{{resolve:secretsmanager:digimetrics-saas/google-ads-developer-token:SecretString}}'
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: !Ref GoogleAdsLoginCustomerId
          # LinkedIn Ads connector — reuses the agency linkedinOAuth app's
          # credentials; data fetch proxies the monday Lambda (see lib/linkedin.mjs).
          LINKEDIN_CLIENT_ID: '{{resolve:secretsmanager:digimetrics-saas/linkedin-client-id:SecretString}}'
          LINKEDIN_CLIENT_SECRET: '{{resolve:secretsmanager:digimetrics-saas/linkedin-client-secret:SecretString}}'
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RunsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CacheTable }
        - DynamoDBCrudPolicy: { TableName: !Ref MetricsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        # A scheduled run stamps its outcome (last run + count) onto the schedule.
        - DynamoDBCrudPolicy: { TableName: !Ref SchedulesTable }
        # Async Social Audit finalize: the gateway invokes ITSELF (Event mode)
        # so the audit completes even if the browser tab closes. The name pattern
        # (not !GetAtt MeteringFn.Arn) avoids a CloudFormation circular dependency.
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-MeteringFn-*'
                # Slow-generation upstreams invoked DIRECTLY (DIRECT_INVOKE in
                # src/metering/index.mjs) to bypass their API Gateway's hard 29s
                # cap — the Media Plan composite (plan + personas + funnel) can
                # legitimately take 30–120s and 504s through the gateway.
                - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:mediaPlanGenerator'
                - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:personaGenerator'
                - !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:generateFunnel'
      # Function URL bypasses API Gateway's hard 30s integration limit for
      # long-running tools (strategy engine, persona, forensic audit). JWT is
      # verified inside the handler; CORS is handled by the handler too.
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
      Events:
        # This /run path is HARD-CAPPED at 30s: HTTP APIs (ApiGatewayV2) have a
        # maximum integration timeout of 30000ms that AWS does NOT allow raising
        # (a quota increase request / update-integration to >30000 is rejected).
        # So this route only serves FAST tools. Anything that can exceed 30s must
        # set `slow: true` in shared/catalog.mjs — the frontend then routes it to
        # the Function URL above (no gateway cap; MeteringFn Timeout is 180s).
        # NOTE: TimeoutInMillis can't be set on this event anyway — the SAM
        # transform fails to link the integration when it is (Target: None → 404).
        Run: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/run/{toolId}', Method: POST, Auth: { Authorizer: JwtAuthorizer } } }

  # ── Billing: checkout/portal (authed) + webhook (public, signed) ────────
  BillingFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/billing/
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: '{{resolve:secretsmanager:digimetrics-saas/stripe-secret-key:SecretString}}'
          STRIPE_WEBHOOK_SECRET: '{{resolve:secretsmanager:digimetrics-saas/stripe-webhook-secret:SecretString}}'
          PRICE_STARTER_MONTHLY: !Sub '{{resolve:ssm:/saas/price/starter/monthly}}'
          PRICE_STARTER_ANNUAL: !Sub '{{resolve:ssm:/saas/price/starter/annual}}'
          PRICE_PRO_MONTHLY: !Sub '{{resolve:ssm:/saas/price/pro/monthly}}'
          PRICE_PRO_ANNUAL: !Sub '{{resolve:ssm:/saas/price/pro/annual}}'
          PRICE_EXPERT_MONTHLY: !Sub '{{resolve:ssm:/saas/price/expert/monthly}}'
          PRICE_EXPERT_ANNUAL: !Sub '{{resolve:ssm:/saas/price/expert/annual}}'
          PRICE_TOPUP_TOPUP_S: !Sub '{{resolve:ssm:/saas/price/topup/topup_s}}'
          PRICE_TOPUP_TOPUP_M: !Sub '{{resolve:ssm:/saas/price/topup/topup_m}}'
          PRICE_TOPUP_TOPUP_L: !Sub '{{resolve:ssm:/saas/price/topup/topup_l}}'
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        # Stripe-event idempotency markers live in the Cache table.
        - DynamoDBCrudPolicy: { TableName: !Ref CacheTable }
      Events:
        Checkout: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/checkout, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Topup: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/topup, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Portal: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/portal, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Invoices: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/invoices, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Webhook: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/webhook, Method: POST } }

  # ── In-app features (authed): chat, support, run history, integrations ──
  AppFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/app/
      Handler: index.handler
      Timeout: 60
      Environment:
        Variables:
          ADMIN_EMAILS: !Ref AdminEmails
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_ADS_DEVELOPER_TOKEN: '{{resolve:secretsmanager:digimetrics-saas/google-ads-developer-token:SecretString}}'
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: !Ref GoogleAdsLoginCustomerId
          # LinkedIn Ads connector — OAuth authorize/callback run in this fn.
          LINKEDIN_CLIENT_ID: '{{resolve:secretsmanager:digimetrics-saas/linkedin-client-id:SecretString}}'
          LINKEDIN_CLIENT_SECRET: '{{resolve:secretsmanager:digimetrics-saas/linkedin-client-secret:SecretString}}'
          # OAuth redirect URI is derived at runtime from the request domain (see
          # app handler) — referencing ${Api} here created a circular dependency.
          ATTACHMENTS_BUCKET: !Ref AttachmentsBucket
          # Account deletion cancels the user's active Stripe subscription.
          STRIPE_SECRET_KEY: '{{resolve:secretsmanager:digimetrics-saas/stripe-secret-key:SecretString}}'
          SES_FROM: !Ref SesFrom
          SES_SUPPORT: !Ref SesSupport
          # Agreement (Free Trial + NDA) notifications prefer authenticated SMTP
          # so they send from a real @mediaone.co mailbox and pass DMARC. The App
          # Password is in Secrets Manager; empty SMTP_USER falls back to SES.
          SMTP_USER: !Ref SmtpUser
          SMTP_FROM: !Ref SmtpFrom
          SMTP_HOST: !Ref SmtpHost
          SMTP_PORT: !Ref SmtpPort
          SMTP_PASS: '{{resolve:secretsmanager:digimetrics-saas/smtp-pass:SecretString}}'
          # "Run now" on a schedule fires the metering gateway (Event mode).
          METERING_FN: !Ref MeteringFn
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RunsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref TicketsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ProjectsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref TrackedTable }
        - DynamoDBCrudPolicy: { TableName: !Ref MetricsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConversationsTable }
        # Scheduled tool runs — CRUD schedules + read the sparse scheduleIndex GSI.
        - DynamoDBCrudPolicy: { TableName: !Ref SchedulesTable }
        # Rate-limit counters live in the Cache table (lib/ratelimit.mjs).
        - DynamoDBCrudPolicy: { TableName: !Ref CacheTable }
        - S3CrudPolicy: { BucketName: !Ref AttachmentsBucket }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
            # "Run now" invokes the metering gateway. Name pattern (not
            # !GetAtt MeteringFn.Arn) keeps the IAM policy free of a hard ref.
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-MeteringFn-*'
      Events:
        Chat: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /chat, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ConversationsList: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /chat/conversations, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        ConversationDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /chat/conversations/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ConversationGet: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/chat/conversations/{conversationId}', Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Runs: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/runs, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        MeExport: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/export, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        MeDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        MeRevokeSessions: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/sessions/revoke, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        MeAccess: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/access, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        MeAccessRespond: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/access/respond, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        MeOnboarding: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/onboarding, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        MeNda: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/nda, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        MeEmailPrefs: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/email-prefs, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        MeProfile: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/profile, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        AuditSynthesize: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /audit/synthesize, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Run: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/me/runs/{runId}', Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        # Scheduled tool runs
        Schedules: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/schedules, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        ScheduleCreate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/schedules, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ScheduleUpdate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/schedules/update, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ScheduleDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/schedules/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ScheduleRunNow: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/schedules/run-now, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ScheduleCompare: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/me/schedules/{scheduleId}/compare', Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Projects: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /projects, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        ProjectCreate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /projects, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ProjectDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /projects/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Tracking: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /tracking, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        TrackAdd: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /tracking, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TrackDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /tracking/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TrackRefresh: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /tracking/refresh, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Metrics: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /metrics, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Notifications: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/notifications, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        NotificationsRead: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/notifications/read, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TicketsList: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /support/tickets, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        TicketCreate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /support/tickets, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TicketGet: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/support/tickets/{ticketId}', Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        TicketReply: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/support/tickets/{ticketId}/reply', Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TicketClose: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/support/tickets/{ticketId}/close', Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Attachments: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /support/attachments, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Integrations: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /integrations, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        IntegrationAccounts: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /integrations/accounts, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        IntegrationAuthorize: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /integrations/authorize, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        IntegrationConnect: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /integrations/connect, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        # Public — identity is carried in the signed OAuth state.
        OAuthCallback: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /oauth/callback, Method: GET } }

  # ── Scheduled: auto-close inactive support tickets (daily) ──────────────
  CloseFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/close/
      Handler: index.handler
      Timeout: 120
      Environment:
        Variables:
          AUTO_CLOSE_DAYS: !Ref AutoCloseDays
          SES_FROM: !Ref SesFrom
          SES_SUPPORT: !Ref SesSupport
          # Lifecycle emails (auto-close + reminders) prefer authenticated SMTP so
          # they send from a real @mediaone.co mailbox — same path as AppFn. Empty
          # SMTP_USER falls back to SES.
          SMTP_USER: !Ref SmtpUser
          SMTP_FROM: !Ref SmtpFrom
          SMTP_HOST: !Ref SmtpHost
          SMTP_PORT: !Ref SmtpPort
          SMTP_PASS: '{{resolve:secretsmanager:digimetrics-saas/smtp-pass:SecretString}}'
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref TicketsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        # Read-only: the admin-tuned ticket lifecycle settings singleton lives here.
        - DynamoDBReadPolicy: { TableName: !Ref UsersTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)

  # ── Scheduled: refresh tracked-keyword rank positions (daily) ───────────
  TrackFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/track/
      Handler: index.handler
      Timeout: 600
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref TrackedTable }
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)

  # ── Scheduled: re-pull connected Google integrations → Performance series ─
  # Daily 0-credit pull of GSC/GA4/Ads for projects already tracking them, so
  # the Performance charts stay current without the user re-opening each tool.
  MetricsCronFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/metricscron/
      Handler: index.handler
      Timeout: 600
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_ADS_DEVELOPER_TOKEN: '{{resolve:secretsmanager:digimetrics-saas/google-ads-developer-token:SecretString}}'
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: !Ref GoogleAdsLoginCustomerId
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref MetricsTable }
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)

  # ── Scheduled: refill free-tier monthly credit allowance (daily) ────────
  RefillFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/refill/
      Handler: index.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)

  # ── Scheduled: fire user-defined recurring tool runs (hourly) ───────────
  # Scans due schedules, claims each (compare-and-swap on nextRunAt so two ticks
  # can't double-fire), then Event-invokes the metering gateway with a synthetic
  # authenticated run tagged with the scheduleId. Hourly cadence gives per-hour
  # fire precision for the daily/weekly/monthly presets.
  SchedulesCronFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/schedules-cron/
      Handler: index.handler
      Timeout: 300
      Environment:
        Variables:
          METERING_FN: !Ref MeteringFn
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref SchedulesTable }
        - DynamoDBReadPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub 'arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-MeteringFn-*'
      Events:
        Hourly:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)

  # ── Streaming assistant chat (Anthropic Messages API, Haiku) ────────────
  # Public RESPONSE_STREAM Function URL — JWT is verified in-handler. Streams
  # tokens to the browser; charges ai_chat + persists the thread after.
  ChatStreamFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/chatstream/
      Handler: index.handler
      Timeout: 120
      Environment:
        Variables:
          ANTHROPIC_KEY: '{{resolve:secretsmanager:digimetrics-saas/anthropic-key:SecretString}}'
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConversationsTable }
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins: ['*']
          AllowMethods: [POST]
          AllowHeaders: [authorization, content-type]
          ExposeHeaders: [x-conversation-id]

  # ── Admin portal API (authed + ADMIN_EMAILS allowlist) ──────────────────
  AdminFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/admin/
      Handler: index.handler
      # Broadcast send fans out in-app writes + SES emails across the audience;
      # give it headroom over the 30s default for larger lists.
      Timeout: 120
      Environment:
        Variables:
          ADMIN_EMAILS: !Ref AdminEmails
          SES_FROM: !Ref SesFrom
          BROADCASTS_TABLE: !Ref BroadcastsTable
          AMPLIFY_APP_ID: !Ref AmplifyAppId
          AMPLIFY_DOMAIN: !Ref AmplifyDomain
          AMPLIFY_BRANCH: !Ref AmplifyBranch
          # Finances balance sheet: read Stripe revenue (read-only list calls).
          STRIPE_SECRET_KEY: '{{resolve:secretsmanager:digimetrics-saas/stripe-secret-key:SecretString}}'
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        # Consent-gated activity view: read a user's runs + conversations, notify them.
        - DynamoDBCrudPolicy: { TableName: !Ref RunsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConversationsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        # Broadcast audit log (audience filter, channels, send counts).
        - DynamoDBCrudPolicy: { TableName: !Ref BroadcastsTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
        # Admin → Platform usage: hosting traffic metrics, spend, build history,
        # and access-log exports for the Amplify app. All read-only; the metric
        # and cost APIs don't support resource-level scoping, so Resource is '*'.
        - Statement:
            - Effect: Allow
              Action: [cloudwatch:GetMetricData, ce:GetCostAndUsage]
              Resource: '*'
            - Effect: Allow
              Action: [amplify:ListJobs, amplify:GenerateAccessLogs, amplify:GetApp]
              Resource:
                - !Sub 'arn:${AWS::Partition}:amplify:${AWS::Region}:${AWS::AccountId}:apps/${AmplifyAppId}'
                - !Sub 'arn:${AWS::Partition}:amplify:${AWS::Region}:${AWS::AccountId}:apps/${AmplifyAppId}/*'
      Events:
        Users: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/users, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        UserCreate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/users, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Agreements: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/agreements, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        AgreementPdf: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/agreements/pdf, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Credits: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/credits, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Tier: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/tier, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        AccessGet: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/access, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        AccessRequest: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/access, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Activity: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/activity, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Usage: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/usage, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Status: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/status, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Role: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/role, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        SettingsGet: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/settings, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        SettingsSet: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/settings, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        BroadcastHistory: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/notifications/history, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        BroadcastPreview: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/notifications/preview, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        BroadcastSend: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/notifications/send, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        BroadcastBackfill: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/notifications/backfill, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        PlatformUsage: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/platform/usage, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        PlatformAccessLogs: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/platform/access-logs, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Finances: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/finances, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }

  # ── Observability: SNS topic + CloudWatch alarms ────────────────────────
  # The topic (and email subscription) only exist when AlarmEmail is set; the
  # alarms always exist and route to it when present, so they're visible in the
  # console regardless.
  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      DisplayName: Digimetrics SaaS alarms
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  # Gateway is the billing choke point — errors here mean tool runs are failing
  # (and credits may be mis-charged). Most important alarm.
  MeteringErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Metering gateway Lambda is throwing errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref MeteringFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  MeteringThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Metering gateway Lambda is being throttled (raise concurrency).
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - { Name: FunctionName, Value: !Ref MeteringFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  AppErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: In-app Lambda (chat, support, projects, tracking) is throwing errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref AppFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Authorizer errors lock everyone out — every authed route 500s if it fails.
  AuthorizerErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: JWT authorizer Lambda is throwing errors — authed routes will 500.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref AuthorizerFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Billing handles the revenue-critical Stripe webhook (failures re-throw, so
  # they register here) plus checkout/portal. Previously had NO alarm.
  BillingErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Billing Lambda is throwing — Stripe webhook/checkout failing (revenue impact).
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref BillingFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  BillingThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Billing Lambda is being throttled — webhook deliveries may be dropped.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - { Name: FunctionName, Value: !Ref BillingFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  AdminErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Admin portal Lambda is throwing errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref AdminFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  MeErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Profile/usage Lambda (/me) is throwing errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref MeFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Scheduled jobs run once/day and catch per-item errors internally, so any
  # surfaced error is a top-level failure (whole run died) — alarm on >=1.
  TrackErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Daily rank-tracking refresh job failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref TrackFn }
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  MetricsCronErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Daily integrations performance-snapshot job failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref MetricsCronFn }
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  CloseErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Daily ticket auto-close job failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref CloseFn }
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  RefillErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Daily free-tier credit refill job failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref RefillFn }
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Hourly, so alarm on a short window — a top-level throw means the whole tick
  # died (per-schedule errors are caught internally).
  SchedulesCronErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Hourly scheduled-runs cron failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref SchedulesCronFn }
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Stripe dispute/chargeback → the webhook logs `stripe_dispute_created`; turn
  # that log line into a metric + alarm so it's surfaced (disputes have tight
  # response windows). References BillingFn's existing log group by name.
  DisputeMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub '/aws/lambda/${BillingFn}'
      FilterPattern: '"stripe_dispute_created"'
      MetricTransformations:
        - MetricName: StripeDisputes
          MetricNamespace: Digimetrics/Billing
          MetricValue: '1'
          DefaultValue: 0

  DisputeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: A Stripe dispute/chargeback was opened — review in Stripe immediately.
      Namespace: Digimetrics/Billing
      MetricName: StripeDisputes
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

Outputs:
  ApiUrl:
    Description: Base URL for the SaaS API (set as VITE_API_BASE in the frontend).
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com'
  RunUrl:
    Description: Function URL for slow tools (set as VITE_RUN_URL in the frontend).
    Value: !GetAtt MeteringFnUrl.FunctionUrl
  ChatStreamUrl:
    Description: Streaming chat Function URL (set as VITE_CHAT_STREAM_URL in the frontend).
    Value: !GetAtt ChatStreamFnUrl.FunctionUrl
