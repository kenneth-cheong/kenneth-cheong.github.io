AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Digimetrics SaaS backend — auth, metering gateway, credits, Stripe billing.

Parameters:
  AppOrigin:
    Type: String
    Description: Frontend origin (Amplify URL or custom domain) for CORS + redirects.
    Default: http://localhost:5173
  GoogleClientId:
    Type: String
  # JwtSecret, StripeSecretKey, StripeWebhookSecret, GatewaySecret and
  # GoogleAdsDeveloperToken were migrated to Secrets Manager (digimetrics-saas/*)
  # and are now referenced via {{resolve:secretsmanager:...}} dynamic references —
  # no longer plaintext CFN parameters.
  AdminEmails:
    Type: String
    Default: tom@mediaone.co,june@mediaone.co,kenneth@mediaone.co
    Description: Comma-separated allowlist of admin emails (access to /admin/*).
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ''
    Description: Google OAuth client secret (for GSC / GA4 / Ads integrations).
  GoogleAdsLoginCustomerId:
    Type: String
    Default: ''
    Description: Google Ads manager (MCC) login-customer-id used for Ads API calls.
  SesFrom:
    Type: String
    Default: ''
    Description: Verified SES "from" address for ticket emails (empty disables email).
  SesSupport:
    Type: String
    Default: ''
    Description: Inbox alerted when a user opens/replies to a ticket.
  AutoCloseDays:
    Type: String
    Default: '7'
    Description: Days of inactivity before a support ticket auto-closes.
  AlarmEmail:
    Type: String
    Default: ''
    Description: Email alerted when a Lambda starts erroring/throttling (empty disables notifications; alarms still fire to the console).

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, '']]

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 256
    Timeout: 30
    Architectures: [arm64]
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        LEDGER_TABLE: !Ref LedgerTable
        RUNS_TABLE: !Ref RunsTable
        TICKETS_TABLE: !Ref TicketsTable
        NOTIFICATIONS_TABLE: !Ref NotificationsTable
        PROJECTS_TABLE: !Ref ProjectsTable
        CACHE_TABLE: !Ref CacheTable
        TRACKED_TABLE: !Ref TrackedTable
        CONVERSATIONS_TABLE: !Ref ConversationsTable
        APP_ORIGIN: !Ref AppOrigin
        JWT_SECRET: '{{resolve:secretsmanager:digimetrics-saas/jwt-secret:SecretString}}'

Resources:
  # ── Data ────────────────────────────────────────────────────────────────
  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: stripeCustomerId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: stripeCustomerIndex
          KeySchema:
            - { AttributeName: stripeCustomerId, KeyType: HASH }
          Projection: { ProjectionType: ALL }

  LedgerTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: ts, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: ts, KeyType: RANGE }

  # Saved tool runs (re-openable history). SK is time-first so newest sorts top.
  RunsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: runId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: runId, KeyType: RANGE }

  # Support tickets (threaded — messages stored inline on the item).
  TicketsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: ticketId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: ticketId, KeyType: RANGE }

  # Projects — group runs/keywords/integrations by site.
  ProjectsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: projectId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: projectId, KeyType: RANGE }

  # Tracked keywords — rank position history per (project, keyword).
  TrackedTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: trackId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: trackId, KeyType: RANGE }

  # Assistant chat conversations — full message thread per (user, conversation).
  ConversationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: conversationId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: conversationId, KeyType: RANGE }

  # Upstream result cache (self-expiring via TTL on `expireAt`).
  CacheTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: key, AttributeType: S }
      KeySchema:
        - { AttributeName: key, KeyType: HASH }
      TimeToLiveSpecification:
        AttributeName: expireAt
        Enabled: true

  # In-platform notifications (ticket replies, closes, etc.).
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - { AttributeName: userId, AttributeType: S }
        - { AttributeName: notifId, AttributeType: S }
      KeySchema:
        - { AttributeName: userId, KeyType: HASH }
        - { AttributeName: notifId, KeyType: RANGE }

  # Ticket attachments (screenshots / files). PRIVATE — objects are served only
  # via short-lived presigned GET URLs the app mints on read (see lib/s3.mjs).
  AttachmentsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      OwnershipControls:
        Rules: [{ ObjectOwnership: BucketOwnerEnforced }]
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']

  # ── Secrets ──────────────────────────────────────────────────────────────
  # Backend secrets live in Secrets Manager (digimetrics-saas/<name>), referenced
  # by the function env vars via {{resolve:secretsmanager:...}} dynamic references
  # — no longer plaintext CFN parameters. The secret resources were created by an
  # earlier transitional deploy and kept (DeletionPolicy: Retain), so they're now
  # managed out-of-band. GoogleClientSecret is the lone exception (empty in this
  # deployment → still a plaintext param; migrate it if Google OAuth is enabled).
  # NOTE: a fresh stack deploy must pre-create these 5 secrets first.

  # ── HTTP API + JWT (Lambda) authorizer ──────────────────────────────────
  Api:
    Type: AWS::Serverless::HttpApi
    Properties:
      # Stage-level throttling — the edge backstop against volumetric floods.
      # Requests beyond these limits get a 429 from API Gateway BEFORE reaching
      # Lambda (so they cost nothing). Set generously: real traffic never trips
      # them; per-user fairness is enforced in-handler (see lib/ratelimit.mjs).
      DefaultRouteSettings:
        ThrottlingBurstLimit: 4000
        ThrottlingRateLimit: 2000
      RouteSettings:
        # The billable tool path gets its own (still generous) ceiling.
        'POST /run/{toolId}':
          ThrottlingBurstLimit: 600
          ThrottlingRateLimit: 300
      CorsConfiguration:
        AllowOrigins: [!Ref AppOrigin]
        AllowHeaders: [Content-Type, Authorization]
        AllowMethods: [GET, POST, OPTIONS]
        AllowCredentials: true
      Auth:
        Authorizers:
          JwtAuthorizer:
            FunctionArn: !GetAtt AuthorizerFn.Arn
            Identity:
              Headers: [Authorization]
            AuthorizerPayloadFormatVersion: '2.0'
            EnableSimpleResponses: true
        # No DefaultAuthorizer → routes are public unless they opt into
        # JwtAuthorizer (auth/webhook stay public; everything else is gated).

  AuthorizerFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/authorizer/
      Handler: index.handler

  # API Gateway must be allowed to invoke the authorizer (SAM doesn't add this
  # for HttpApi Lambda authorizers referenced by ARN — without it every authed
  # route 500s before the function runs).
  AuthorizerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AuthorizerFn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${Api}/authorizers/*'

  # ── Auth (public): Google login + token refresh ─────────────────────────
  AuthFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/auth/
      Handler: index.handler
      Environment:
        Variables:
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          ADMIN_EMAILS: !Ref AdminEmails
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        # Rate-limit counters live in the Cache table (lib/ratelimit.mjs).
        - DynamoDBCrudPolicy: { TableName: !Ref CacheTable }
      Events:
        Google: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/google, Method: POST } }
        Refresh: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /auth/refresh, Method: POST } }

  # ── Profile + usage (authed) ────────────────────────────────────────────
  MeFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/me/
      Handler: index.handler
      Environment:
        Variables:
          ADMIN_EMAILS: !Ref AdminEmails
      Policies:
        - DynamoDBReadPolicy: { TableName: !Ref UsersTable }
        - DynamoDBReadPolicy: { TableName: !Ref LedgerTable }
      Events:
        Me: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Usage: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/usage, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }

  # ── Metering gateway (authed): the choke point for every tool ───────────
  MeteringFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/metering/
      Handler: index.handler
      # Long timeout for the Function-URL (slow-tool) path; the API-Gateway path
      # is still capped at the platform's 30s regardless.
      Timeout: 180
      Environment:
        Variables:
          GATEWAY_SECRET: '{{resolve:secretsmanager:digimetrics-saas/gateway-secret:SecretString}}'
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_ADS_DEVELOPER_TOKEN: '{{resolve:secretsmanager:digimetrics-saas/google-ads-developer-token:SecretString}}'
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: !Ref GoogleAdsLoginCustomerId
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RunsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref CacheTable }
      # Function URL bypasses API Gateway's hard 30s integration limit for
      # long-running tools (strategy engine, persona, forensic audit). JWT is
      # verified inside the handler; CORS is handled by the handler too.
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: BUFFERED
      Events:
        # Account has a raised API Gateway integration-timeout quota (180s), so
        # the normal /run path can also serve slow tools (the Function URL above
        # is the redundant/long-tail path).
        # NOTE: no TimeoutInMillis — the server-side SAM transform fails to link a
        # route's integration when it's set (route ends up with Target: None → 404).
        # Slow tools use the Function URL (RunUrl) anyway; this API path serves
        # fast tools that finish within the 30s default.
        Run: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/run/{toolId}', Method: POST, Auth: { Authorizer: JwtAuthorizer } } }

  # ── Billing: checkout/portal (authed) + webhook (public, signed) ────────
  BillingFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/billing/
      Handler: index.handler
      Environment:
        Variables:
          STRIPE_SECRET_KEY: '{{resolve:secretsmanager:digimetrics-saas/stripe-secret-key:SecretString}}'
          STRIPE_WEBHOOK_SECRET: '{{resolve:secretsmanager:digimetrics-saas/stripe-webhook-secret:SecretString}}'
          PRICE_STARTER_MONTHLY: !Sub '{{resolve:ssm:/saas/price/starter/monthly}}'
          PRICE_STARTER_ANNUAL: !Sub '{{resolve:ssm:/saas/price/starter/annual}}'
          PRICE_PRO_MONTHLY: !Sub '{{resolve:ssm:/saas/price/pro/monthly}}'
          PRICE_PRO_ANNUAL: !Sub '{{resolve:ssm:/saas/price/pro/annual}}'
          PRICE_EXPERT_MONTHLY: !Sub '{{resolve:ssm:/saas/price/expert/monthly}}'
          PRICE_EXPERT_ANNUAL: !Sub '{{resolve:ssm:/saas/price/expert/annual}}'
          PRICE_TOPUP_TOPUP_S: !Sub '{{resolve:ssm:/saas/price/topup/topup_s}}'
          PRICE_TOPUP_TOPUP_M: !Sub '{{resolve:ssm:/saas/price/topup/topup_m}}'
          PRICE_TOPUP_TOPUP_L: !Sub '{{resolve:ssm:/saas/price/topup/topup_l}}'
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        # Stripe-event idempotency markers live in the Cache table.
        - DynamoDBCrudPolicy: { TableName: !Ref CacheTable }
      Events:
        Checkout: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/checkout, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Topup: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/topup, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Portal: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/portal, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Invoices: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/invoices, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Webhook: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /billing/webhook, Method: POST } }

  # ── In-app features (authed): chat, support, run history, integrations ──
  AppFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/app/
      Handler: index.handler
      Timeout: 60
      Environment:
        Variables:
          ADMIN_EMAILS: !Ref AdminEmails
          GOOGLE_CLIENT_ID: !Ref GoogleClientId
          GOOGLE_CLIENT_SECRET: !Ref GoogleClientSecret
          GOOGLE_ADS_DEVELOPER_TOKEN: '{{resolve:secretsmanager:digimetrics-saas/google-ads-developer-token:SecretString}}'
          GOOGLE_ADS_LOGIN_CUSTOMER_ID: !Ref GoogleAdsLoginCustomerId
          # OAuth redirect URI is derived at runtime from the request domain (see
          # app handler) — referencing ${Api} here created a circular dependency.
          ATTACHMENTS_BUCKET: !Ref AttachmentsBucket
          # Account deletion cancels the user's active Stripe subscription.
          STRIPE_SECRET_KEY: '{{resolve:secretsmanager:digimetrics-saas/stripe-secret-key:SecretString}}'
          SES_FROM: !Ref SesFrom
          SES_SUPPORT: !Ref SesSupport
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        - DynamoDBCrudPolicy: { TableName: !Ref RunsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref TicketsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ProjectsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref TrackedTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConversationsTable }
        # Rate-limit counters live in the Cache table (lib/ratelimit.mjs).
        - DynamoDBCrudPolicy: { TableName: !Ref CacheTable }
        - S3CrudPolicy: { BucketName: !Ref AttachmentsBucket }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
      Events:
        Chat: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /chat, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ConversationsList: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /chat/conversations, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        ConversationDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /chat/conversations/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ConversationGet: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/chat/conversations/{conversationId}', Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Runs: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/runs, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        MeExport: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/export, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        MeDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        MeRevokeSessions: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/sessions/revoke, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        MeAccess: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/access, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        MeAccessRespond: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/access/respond, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        AuditSynthesize: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /audit/synthesize, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Run: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/me/runs/{runId}', Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Projects: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /projects, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        ProjectCreate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /projects, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        ProjectDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /projects/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Tracking: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /tracking, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        TrackAdd: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /tracking, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TrackDelete: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /tracking/delete, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TrackRefresh: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /tracking/refresh, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Notifications: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/notifications, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        NotificationsRead: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /me/notifications/read, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TicketsList: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /support/tickets, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        TicketCreate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /support/tickets, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TicketGet: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/support/tickets/{ticketId}', Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        TicketReply: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/support/tickets/{ticketId}/reply', Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        TicketClose: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: '/support/tickets/{ticketId}/close', Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Attachments: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /support/attachments, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Integrations: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /integrations, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        IntegrationAccounts: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /integrations/accounts, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        IntegrationAuthorize: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /integrations/authorize, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        IntegrationConnect: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /integrations/connect, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        # Public — identity is carried in the signed OAuth state.
        OAuthCallback: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /oauth/callback, Method: GET } }

  # ── Scheduled: auto-close inactive support tickets (daily) ──────────────
  CloseFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/close/
      Handler: index.handler
      Timeout: 120
      Environment:
        Variables:
          AUTO_CLOSE_DAYS: !Ref AutoCloseDays
          SES_FROM: !Ref SesFrom
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref TicketsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)

  # ── Scheduled: refresh tracked-keyword rank positions (daily) ───────────
  TrackFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/track/
      Handler: index.handler
      Timeout: 600
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref TrackedTable }
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)

  # ── Scheduled: refill free-tier monthly credit allowance (daily) ────────
  RefillFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/refill/
      Handler: index.handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
      Events:
        Daily:
          Type: Schedule
          Properties:
            Schedule: rate(1 day)

  # ── Streaming assistant chat (Anthropic Messages API, Haiku) ────────────
  # Public RESPONSE_STREAM Function URL — JWT is verified in-handler. Streams
  # tokens to the browser; charges ai_chat + persists the thread after.
  ChatStreamFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/chatstream/
      Handler: index.handler
      Timeout: 120
      Environment:
        Variables:
          ANTHROPIC_KEY: '{{resolve:secretsmanager:digimetrics-saas/anthropic-key:SecretString}}'
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConversationsTable }
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM
        Cors:
          AllowOrigins: ['*']
          AllowMethods: [POST]
          AllowHeaders: [authorization, content-type]
          ExposeHeaders: [x-conversation-id]

  # ── Admin portal API (authed + ADMIN_EMAILS allowlist) ──────────────────
  AdminFn:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .build/admin/
      Handler: index.handler
      Environment:
        Variables:
          ADMIN_EMAILS: !Ref AdminEmails
          SES_FROM: !Ref SesFrom
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LedgerTable }
        # Consent-gated activity view: read a user's runs + conversations, notify them.
        - DynamoDBCrudPolicy: { TableName: !Ref RunsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ConversationsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref NotificationsTable }
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: '*'
      Events:
        Users: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/users, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        UserCreate: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/users, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Credits: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/credits, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Tier: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/tier, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        AccessGet: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/access, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        AccessRequest: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/access, Method: POST, Auth: { Authorizer: JwtAuthorizer } } }
        Activity: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/activity, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }
        Usage: { Type: HttpApi, Properties: { ApiId: !Ref Api, Path: /admin/usage, Method: GET, Auth: { Authorizer: JwtAuthorizer } } }

  # ── Observability: SNS topic + CloudWatch alarms ────────────────────────
  # The topic (and email subscription) only exist when AlarmEmail is set; the
  # alarms always exist and route to it when present, so they're visible in the
  # console regardless.
  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      DisplayName: Digimetrics SaaS alarms
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  # Gateway is the billing choke point — errors here mean tool runs are failing
  # (and credits may be mis-charged). Most important alarm.
  MeteringErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Metering gateway Lambda is throwing errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref MeteringFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  MeteringThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Metering gateway Lambda is being throttled (raise concurrency).
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - { Name: FunctionName, Value: !Ref MeteringFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  AppErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: In-app Lambda (chat, support, projects, tracking) is throwing errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref AppFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Authorizer errors lock everyone out — every authed route 500s if it fails.
  AuthorizerErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: JWT authorizer Lambda is throwing errors — authed routes will 500.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref AuthorizerFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Billing handles the revenue-critical Stripe webhook (failures re-throw, so
  # they register here) plus checkout/portal. Previously had NO alarm.
  BillingErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Billing Lambda is throwing — Stripe webhook/checkout failing (revenue impact).
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref BillingFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']
      OKActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  BillingThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Billing Lambda is being throttled — webhook deliveries may be dropped.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - { Name: FunctionName, Value: !Ref BillingFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  AdminErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Admin portal Lambda is throwing errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref AdminFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  MeErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Profile/usage Lambda (/me) is throwing errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref MeFn }
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Scheduled jobs run once/day and catch per-item errors internally, so any
  # surfaced error is a top-level failure (whole run died) — alarm on >=1.
  TrackErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Daily rank-tracking refresh job failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref TrackFn }
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  CloseErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Daily ticket auto-close job failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref CloseFn }
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  RefillErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Daily free-tier credit refill job failed.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - { Name: FunctionName, Value: !Ref RefillFn }
      Statistic: Sum
      Period: 86400
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

  # Stripe dispute/chargeback → the webhook logs `stripe_dispute_created`; turn
  # that log line into a metric + alarm so it's surfaced (disputes have tight
  # response windows). References BillingFn's existing log group by name.
  DisputeMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub '/aws/lambda/${BillingFn}'
      FilterPattern: '"stripe_dispute_created"'
      MetricTransformations:
        - MetricName: StripeDisputes
          MetricNamespace: Digimetrics/Billing
          MetricValue: '1'
          DefaultValue: 0

  DisputeAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: A Stripe dispute/chargeback was opened — review in Stripe immediately.
      Namespace: Digimetrics/Billing
      MetricName: StripeDisputes
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If [HasAlarmEmail, [!Ref AlarmTopic], !Ref 'AWS::NoValue']

Outputs:
  ApiUrl:
    Description: Base URL for the SaaS API (set as VITE_API_BASE in the frontend).
    Value: !Sub 'https://${Api}.execute-api.${AWS::Region}.amazonaws.com'
  RunUrl:
    Description: Function URL for slow tools (set as VITE_RUN_URL in the frontend).
    Value: !GetAtt MeteringFnUrl.FunctionUrl
  ChatStreamUrl:
    Description: Streaming chat Function URL (set as VITE_CHAT_STREAM_URL in the frontend).
    Value: !GetAtt ChatStreamFnUrl.FunctionUrl
