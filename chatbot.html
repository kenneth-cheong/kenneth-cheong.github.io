<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monday x OpenAI Chatbot</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-navy: #1a1f3c;
            --secondary-navy: #2a2f5b;
            --accent-blue: #3b82f6;
            --accent-light: #dbeafe;
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Layout */
        .app-container {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        header {
            height: 80px;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--primary-navy);
            color: #fff;
            z-index: 10;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header .controls {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        /* Settings Sidebar */
        .settings-sidebar {
            position: absolute;
            top: 80px;
            right: -400px;
            width: 350px;
            height: calc(100% - 80px);
            background: #fff;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 20;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .settings-sidebar.active {
            right: 0;
        }

        .settings-sidebar h2 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            font-size: 1.25rem;
            color: var(--primary-navy);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-group input {
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px;
            overflow: hidden;
            background: rgba(255,255,255,0.4);
        }

        #messageList {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-right: 12px;
        }

        /* Scrollbar */
        #messageList::-webkit-scrollbar {
            width: 6px;
        }
        #messageList::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent-gradient);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
        }

        .message.bot {
            align-self: flex-start;
            background: #fff;
            color: var(--text-main);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .message .time {
            font-size: 0.7rem;
            margin-top: 8px;
            opacity: 0.6;
            display: block;
            text-align: right;
        }

        /* Input Area */
        .input-bar {
            margin-top: 24px;
            background: #fff;
            padding: 12px;
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .input-bar textarea {
            flex: 1;
            border: none;
            resize: none;
            padding: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            max-height: 150px;
            min-height: 24px;
        }

        .icon-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--accent-gradient);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        .icon-btn:hover {
            transform: scale(1.05);
        }

        .icon-btn:disabled {
            background: #cbd5e1;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Typing Indicator */
        .typing {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: none;
        }

        .typing.active {
            display: block;
        }

        /* Status Indicator */
        .status-badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: #f1f5f9;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-badge.synced {
            background: #dcfce7;
            color: #166534;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .app-container { width: 100%; height: 100vh; border-radius: 0; }
            .settings-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1><i class="fas fa-robot"></i> Monday Chat AI</h1>
            <div class="controls">
                <div id="syncStatus" class="status-badge">
                    <i class="fas fa-circle-notch fa-spin" id="syncIcon"></i> 
                    <span id="syncText">No Context</span>
                </div>
                <button class="btn btn-outline" onclick="toggleSettings()">
                    <i class="fas fa-cog"></i> Settings
                </button>
            </div>
        </header>

        <aside class="settings-sidebar" id="settingsSidebar">
            <h2>Settings</h2>
            <div class="form-group">
                <label>OpenAI API Key</label>
                <input type="password" id="openaiKey" placeholder="sk-...">
            </div>
            <div class="form-group">
                <label>Monday API Key</label>
                <input type="password" id="mondayKey" placeholder="ey...">
            </div>
            <div class="form-group">
                <label>Monday Board ID</label>
                <input type="text" id="boardId" placeholder="2845615047">
            </div>
            <button class="btn btn-primary" onclick="saveSettings()">
                <i class="fas fa-save"></i> Save & Sync
            </button>
            <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: auto;">
                Note: Keys are saved in your browser's local storage for convenience.
            </p>
        </aside>

        <main class="chat-area">
            <div id="messageList">
                <div class="message bot">
                    Hello! I'm your Monday.com assistant. Once you've added your API keys and Board ID in settings, I can help you analyze your board data and activity.
                    <span class="time">Just now</span>
                </div>
            </div>

            <div class="typing" id="typingIndicator">AI is thinking...</div>

            <div class="input-bar">
                <textarea id="userInput" placeholder="Ask anything about your Monday board..." rows="1"></textarea>
                <button class="icon-btn" id="sendBtn" onclick="handleSendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        let isSyncing = false;
        let threadId = localStorage.getItem('threadId') || null;
        let assistantId = localStorage.getItem('assistantId') || null;
        let vectorStoreId = localStorage.getItem('vectorStoreId') || null;

        // Initialize from localStorage
        window.onload = () => {
            document.getElementById('openaiKey').value = localStorage.getItem('openaiKey') || "";
            document.getElementById('mondayKey').value = localStorage.getItem('mondayKey') || "";
            document.getElementById('boardId').value = localStorage.getItem('boardId') || "";
            
            if (assistantId) {
                updateSyncStatus("Assistant Ready", false, true);
            }
        };

        function toggleSettings() {
            const sidebar = document.getElementById('settingsSidebar');
            sidebar.classList.toggle('active');
        }

        async function saveSettings() {
            const openaiKey = document.getElementById('openaiKey').value;
            const mondayKey = document.getElementById('mondayKey').value;
            const boardId = document.getElementById('boardId').value;

            localStorage.setItem('openaiKey', openaiKey);
            localStorage.setItem('mondayKey', mondayKey);
            localStorage.setItem('boardId', boardId);

            toggleSettings();
            await syncMondayToOpenAI();
        }

        async function syncMondayToOpenAI() {
            if (isSyncing) return;
            const mondayKey = localStorage.getItem('mondayKey');
            const boardId = localStorage.getItem('boardId');
            const openaiKey = localStorage.getItem('openaiKey');

            if (!mondayKey || !boardId || !openaiKey) {
                updateSyncStatus("Missing Config", false);
                return;
            }

            isSyncing = true;
            updateSyncStatus("Fetching Monday...", true);

            try {
                // 1. Fetch from Monday.com
                const query = `
                {
                    boards(ids: [${boardId}]) {
                        name
                        items_page (limit: 500) {
                            items {
                                name
                                column_values { text column { title } }
                                updates (limit: 5) { text_body created_at creator { name } }
                            }
                        }
                    }
                }`;

                const mResponse = await fetch("https://api.monday.com/v2", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': mondayKey,
                        'API-Version': '2023-10'
                    },
                    body: JSON.stringify({ query })
                });

                const mData = await mResponse.json();
                if (mData.errors) throw new Error(mData.errors[0].message);
                const board = mData.data.boards[0];
                if (!board) throw new Error("Board not found.");

                updateSyncStatus(`Uploading to OpenAI...`, true);

                // 2. Upload to OpenAI Files
                const blob = new Blob([JSON.stringify(board, null, 2)], { type: 'application/json' });
                const file = new File([blob], `monday_board_${boardId}.json`);
                
                const fd = new FormData();
                fd.append('purpose', 'assistants');
                fd.append('file', file);

                const fResponse = await fetch("https://api.openai.com/v1/files", {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${openaiKey}` },
                    body: fd
                });
                const fData = await fResponse.json();
                if (fData.error) throw new Error(fData.error.message);
                const fileId = fData.id;

                updateSyncStatus(`Creating Vector Store...`, true);

                // 3. Create Vector Store (or use existing)
                if (!vectorStoreId) {
                    const vsResponse = await fetch("https://api.openai.com/v1/vector_stores", {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${openaiKey}`,
                            'Content-Type': 'application/json',
                            'OpenAI-Beta': 'assistants=v2'
                        },
                        body: JSON.stringify({ name: `Monday Board ${boardId} Store` })
                    });
                    const vsData = await vsResponse.json();
                    vectorStoreId = vsData.id;
                    localStorage.setItem('vectorStoreId', vectorStoreId);
                }

                // 4. Add File to Vector Store
                await fetch(`https://api.openai.com/v1/vector_stores/${vectorStoreId}/files`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${openaiKey}`,
                        'Content-Type': 'application/json',
                        'OpenAI-Beta': 'assistants=v2'
                    },
                    body: JSON.stringify({ file_id: fileId })
                });

                updateSyncStatus(`Updating Assistant...`, true);

                // 5. Create/Update Assistant
                if (!assistantId) {
                    const aResponse = await fetch("https://api.openai.com/v1/assistants", {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${openaiKey}`,
                            'Content-Type': 'application/json',
                            'OpenAI-Beta': 'assistants=v2'
                        },
                        body: JSON.stringify({
                            name: `Monday AI Assistant`,
                            instructions: "You are a specialized Assistant for Monday.com. Use the file_search tool to retrieve board data and answer user questions. Always reference the board data provided in the vector store.",
                            model: "gpt-4o-mini",
                            tools: [{ type: "file_search" }],
                            tool_resources: { file_search: { vector_store_ids: [vectorStoreId] } }
                        })
                    });
                    const aData = await aResponse.json();
                    assistantId = aData.id;
                    localStorage.setItem('assistantId', assistantId);
                } else {
                    // Update existing assistant with new vector store just in case
                    await fetch(`https://api.openai.com/v1/assistants/${assistantId}`, {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${openaiKey}`,
                            'Content-Type': 'application/json',
                            'OpenAI-Beta': 'assistants=v2'
                        },
                        body: JSON.stringify({
                            tool_resources: { file_search: { vector_store_ids: [vectorStoreId] } }
                        })
                    });
                }

                updateSyncStatus(`Synced: ${board.name}`, false, true);
                addMessage("bot", `Sync complete for board: **${board.name}**. I've uploaded the latest data and am ready to answer your questions!`);

            } catch (error) {
                console.error("Assistant Sync Error:", error);
                updateSyncStatus("Sync Failed", false);
                addMessage("bot", `I had trouble syncing your data to OpenAI: ${error.message}`);
            } finally {
                isSyncing = false;
            }
        }

        function updateSyncStatus(text, loading, success = false) {
            const statusBadge = document.getElementById('syncStatus');
            const syncText = document.getElementById('syncText');
            const syncIcon = document.getElementById('syncIcon');

            syncText.innerText = text;
            statusBadge.className = "status-badge" + (success ? " synced" : "");
            syncIcon.className = loading ? "fas fa-circle-notch fa-spin" : (success ? "fas fa-check-circle" : "fas fa-exclamation-triangle");
        }

        async function handleSendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || isSyncing) return;

            const openaiKey = localStorage.getItem('openaiKey');
            if (!assistantId) {
                alert("Please sync your Monday data first.");
                toggleSettings();
                return;
            }

            addMessage("user", text);
            input.value = "";
            input.style.height = 'auto';
            showTyping(true);

            try {
                // 1. Create Thread if not exists
                if (!threadId) {
                    const tResponse = await fetch("https://api.openai.com/v1/threads", {
                        method: 'POST',
                        headers: { 
                            'Authorization': `Bearer ${openaiKey}`,
                            'Content-Type': 'application/json',
                            'OpenAI-Beta': 'assistants=v2'
                        }
                    });
                    const tData = await tResponse.json();
                    threadId = tData.id;
                    localStorage.setItem('threadId', threadId);
                }

                // 2. Add Message to Thread
                await fetch(`https://api.openai.com/v1/threads/${threadId}/messages`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${openaiKey}`,
                        'Content-Type': 'application/json',
                        'OpenAI-Beta': 'assistants=v2'
                    },
                    body: JSON.stringify({ role: "user", content: text })
                });

                // 3. Create Run
                const rResponse = await fetch(`https://api.openai.com/v1/threads/${threadId}/runs`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${openaiKey}`,
                        'Content-Type': 'application/json',
                        'OpenAI-Beta': 'assistants=v2'
                    },
                    body: JSON.stringify({ assistant_id: assistantId })
                });
                const rData = await rResponse.json();
                const runId = rData.id;

                // 4. Poll for Completion
                let runStatus = "queued";
                while (runStatus !== "completed" && runStatus !== "failed") {
                    await new Promise(r => setTimeout(r, 1000));
                    const pollRes = await fetch(`https://api.openai.com/v1/threads/${threadId}/runs/${runId}`, {
                        headers: { 'Authorization': `Bearer ${openaiKey}`, 'OpenAI-Beta': 'assistants=v2' }
                    });
                    const pollData = await pollRes.json();
                    runStatus = pollData.status;
                }

                if (runStatus === "failed") throw new Error("Assistant run failed.");

                // 5. Get Last Message
                const mResponse = await fetch(`https://api.openai.com/v1/threads/${threadId}/messages?limit=1`, {
                    headers: { 'Authorization': `Bearer ${openaiKey}`, 'OpenAI-Beta': 'assistants=v2' }
                });
                const mData = await mResponse.json();
                const lastMsg = mData.data[0];
                
                if (lastMsg && lastMsg.role === "assistant") {
                    const reply = lastMsg.content[0].text.value;
                    addMessage("bot", reply);
                }

            } catch (error) {
                console.error("AI Assistant Error:", error);
                addMessage("bot", `Error communicating with Assistant: ${error.message}`);
            } finally {
                showTyping(false);
            }
        }

        function addMessage(sender, text) {
            const list = document.getElementById('messageList');
            const msg = document.createElement('div');
            msg.className = `message ${sender}`;
            
            // Format bold and list items
            const formattedText = text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/^- (.*)/gm, '• $1');

            msg.innerHTML = `${formattedText}<span class="time">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>`;
            list.appendChild(msg);
            list.scrollTop = list.scrollHeight;
        }

        function showTyping(show) {
            document.getElementById('typingIndicator').classList.toggle('active', show);
            document.getElementById('sendBtn').disabled = show;
        }

        document.getElementById('userInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        });
    </script>
</body>
</html>
