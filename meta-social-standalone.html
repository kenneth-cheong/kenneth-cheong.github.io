<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Social — Connect</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: #0f172a;
      --border: #243754;
      --primary: #1877f2;
      --text: #e6eefc;
      --muted: #9db0cf;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #15305d 0%, #07111f 38%, #03070f 100%);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      padding: 24px;
    }
    .card {
      background: linear-gradient(180deg, rgba(17,31,56,.96), rgba(9,17,31,.97));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 32px 80px rgba(0,0,0,.4);
      display: flex;
      flex-direction: column;
      gap: 24px;
      text-align: center;
    }

    /* Logo area */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .logo svg { width: 40px; height: 40px; }
    .logo-text { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }

    h1 { font-size: 26px; font-weight: 700; }
    .sub { color: var(--muted); font-size: 14px; line-height: 1.6; }

    /* App ID field */
    .field { text-align: left; display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; font-weight: 600; color: #d8e4f8; }
    .field input {
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid #30445f;
      background: #08111f;
      color: var(--text);
      font-size: 14px;
      outline: none;
      width: 100%;
      transition: border-color .2s;
    }
    .field input:focus { border-color: #4f8cff; }

    /* Facebook login button */
    #loginBtn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: 14px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }
    #loginBtn:hover { opacity: .9; transform: translateY(-1px); }
    #loginBtn:active { transform: translateY(0); opacity: 1; }
    #loginBtn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    #loginBtn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Status / connected state */
    .status-box {
      border-radius: 14px;
      padding: 16px;
      display: none;
      text-align: left;
    }
    .status-box.connected {
      display: block;
      background: rgba(34,197,94,.1);
      border: 1px solid rgba(34,197,94,.3);
    }
    .status-box.error {
      display: block;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
    }
    .status-row { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #1e3a5f;
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info strong { display: block; font-size: 15px; }
    .user-info span { color: var(--muted); font-size: 13px; }
    .disconnect {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      background: transparent;
      border: 1px solid #30445f;
      border-radius: 10px;
      padding: 7px 14px;
      cursor: pointer;
      width: 100%;
      transition: border-color .2s, color .2s;
    }
    .disconnect:hover { border-color: #ef4444; color: #ef4444; }

    .flash {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      display: none;
    }
    .flash.show { display: block; }
    .flash.error { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <!-- Facebook 'f' icon -->
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="40" height="40" rx="10" fill="#1877f2"/>
        <path d="M27 20h-4v12h-5V20h-3v-5h3v-3c0-3.3 2-5 5-5 1.4 0 2.9.1 4.3.3V12H25c-1.6 0-2 .8-2 2v1h4.5l-.5 5z" fill="white"/>
      </svg>
      <span class="logo-text">Meta Social</span>
    </div>

    <div>
      <h1>Connect your account</h1>
      <p class="sub" style="margin-top:8px;">Enter your Facebook App ID, then click the button below to log in. That's all.</p>
    </div>

    <!-- App ID -->
    <div class="field">
      <label for="fbAppId">Facebook App ID</label>
      <input id="fbAppId" type="text" placeholder="e.g. 123456789012345" autocomplete="off" />
    </div>

    <!-- Flash message -->
    <div id="flash" class="flash"></div>

    <!-- Connected state -->
    <div id="statusBox" class="status-box">
      <div class="status-row">
        <div class="avatar" id="avatarEl">🙂</div>
        <div class="user-info">
          <strong id="userName">—</strong>
          <span id="userEmail">—</span>
        </div>
      </div>
      <button class="disconnect" id="disconnectBtn">Disconnect</button>
    </div>

    <!-- Login button -->
    <button id="loginBtn">
      <!-- FB logo -->
      <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.66 9.12 8.44 9.88v-6.99H7.9V12h2.54V9.8c0-2.51 1.49-3.89 3.78-3.89 1.09 0 2.23.2 2.23.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99C18.34 21.12 22 17 22 12z"/>
      </svg>
      Continue with Facebook
    </button>

    <p class="sub" style="font-size:12px;">Your token is stored in this browser tab only (sessionStorage) and is never sent anywhere outside of Meta's own API.</p>
  </div>

  <script>
    const FB_VERSION = 'v24.0';
    const SCOPES = 'public_profile';

    const $ = id => document.getElementById(id);
    let sdkReady = false;

    // ── helpers ─────────────────────────────────────────────────────────────
    function flash(msg, type = 'error') {
      const el = $('flash');
      el.className = `flash show ${type}`;
      el.textContent = msg;
      clearTimeout(flash._t);
      flash._t = setTimeout(() => { el.className = 'flash'; el.textContent = ''; }, 4000);
    }

    function saveAuth(data) { sessionStorage.setItem('metaAuth', JSON.stringify(data)); }
    function loadAuth() { try { return JSON.parse(sessionStorage.getItem('metaAuth')); } catch { return null; } }
    function clearAuth() { sessionStorage.removeItem('metaAuth'); }

    // ── UI ───────────────────────────────────────────────────────────────────
    function showConnected(user) {
      $('statusBox').className = 'status-box connected';
      $('userName').textContent = user.name || 'Facebook user';
      $('userEmail').textContent = user.email || user.id || '';
      if (user.picture) {
        $('avatarEl').innerHTML = `<img src="${user.picture}" alt="${user.name}" />`;
      }
      $('loginBtn').style.display = 'none';
    }

    function showDisconnected() {
      $('statusBox').className = 'status-box';
      $('loginBtn').style.display = '';
      $('loginBtn').disabled = false;
      $('loginBtn').textContent = 'Continue with Facebook';
      // re-add icon
      $('loginBtn').innerHTML = `
        <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" style="width:20px;height:20px;flex-shrink:0">
          <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.66 9.12 8.44 9.88v-6.99H7.9V12h2.54V9.8c0-2.51 1.49-3.89 3.78-3.89 1.09 0 2.23.2 2.23.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99C18.34 21.12 22 17 22 12z"/>
        </svg>
        Continue with Facebook`;
    }

    // ── SDK ──────────────────────────────────────────────────────────────────
    function loadSdk(appId) {
      return new Promise((resolve, reject) => {
        if (window.FB && sdkReady) return resolve(window.FB);

        // Remove any old script
        const old = document.getElementById('facebook-jssdk');
        if (old) old.remove();

        window.fbAsyncInit = () => {
          window.FB.init({ appId, cookie: true, xfbml: false, version: FB_VERSION });
          sdkReady = true;
          resolve(window.FB);
        };

        const s = document.createElement('script');
        s.id = 'facebook-jssdk';
        s.async = true;
        s.src = 'https://connect.facebook.net/en_US/sdk.js';
        s.onerror = () => reject(new Error('Could not load Facebook SDK. Check your network.'));
        document.body.appendChild(s);
      });
    }

    function fbLogin() {
      return new Promise((resolve, reject) => {
        window.FB.login(r => {
          if (r?.authResponse) resolve(r);
          else reject(new Error('Login cancelled or failed.'));
        }, { scope: SCOPES, return_scopes: true });
      });
    }

    function fbMe() {
      return new Promise((resolve, reject) => {
        window.FB.api('/me', 'GET', { fields: 'id,name,email,picture.width(80).height(80)' }, r => {
          if (r?.error) reject(new Error(r.error.message));
          else resolve(r);
        });
      });
    }

    // ── main flow ────────────────────────────────────────────────────────────
    async function doLogin() {
      const appId = $('fbAppId').value.trim();
      if (!appId) { flash('Please enter your Facebook App ID first.'); return; }

      $('loginBtn').disabled = true;
      $('loginBtn').textContent = 'Connecting…';

      try {
        await loadSdk(appId);
        await fbLogin();
        const me = await fbMe();
        const user = {
          id: me.id,
          name: me.name,
          email: me.email || null,
          picture: me.picture?.data?.url || null,
          appId,
          at: new Date().toISOString()
        };
        saveAuth(user);
        showConnected(user);
      } catch (err) {
        flash(err.message);
        showDisconnected();
      }
    }

    async function doDisconnect() {
      if (window.FB) window.FB.logout(() => {});
      clearAuth();
      sdkReady = false;
      showDisconnected();
    }

    // ── restore session ──────────────────────────────────────────────────────
    (function init() {
      const saved = loadAuth();
      if (saved) {
        $('fbAppId').value = saved.appId || '';
        showConnected(saved);
      }
    })();

    $('loginBtn').addEventListener('click', doLogin);
    $('disconnectBtn').addEventListener('click', doDisconnect);
  </script>

</body>
</html>
