<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Connecting…</title>
  <style>
    html,body{height:100%;margin:0}
    body{display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:#f8fafc;color:#475569}
    .box{text-align:center;max-width:340px;padding:24px}
    .spinner{width:34px;height:34px;border:3px solid #e2e8f0;border-top-color:#4f46e5;
      border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    h1{font-size:16px;font-weight:700;color:#1e293b;margin:0 0 6px}
    p{font-size:13px;line-height:1.6;margin:0}
    .err{color:#b91c1c}
  </style>
</head>
<body>
  <!--
    OAuth redirect bridge for Monthly Social Reports "Connect with …".
    The platform (Meta / LinkedIn / TikTok) redirects the consent popup here with
    ?code=…&state=… (or ?error=…). This page is same-origin with the app that
    opened it, so it just hands those params back via postMessage and closes — the
    app finishes the exchange server-side. It deliberately does NOT load the app.
  -->
  <div class="box">
    <div class="spinner" id="spin"></div>
    <h1 id="title">Finishing sign-in…</h1>
    <p id="msg">You can close this window if it doesn't close on its own.</p>
  </div>
  <script>
    (function () {
      function params(search) {
        var out = {}, q = (search || '').replace(/^\?/, '');
        q.split('&').forEach(function (pair) {
          if (!pair) return;
          var i = pair.indexOf('='); var k = i < 0 ? pair : pair.slice(0, i);
          out[decodeURIComponent(k)] = i < 0 ? '' : decodeURIComponent(pair.slice(i + 1).replace(/\+/g, ' '));
        });
        return out;
      }
      // Auth codes can arrive in the query string or the hash fragment.
      var p = params(window.location.search);
      if (!p.code && !p.error && window.location.hash) {
        p = params(window.location.hash.replace(/^#/, ''));
      }
      var payload = {
        source: 'sr-oauth',
        code: p.code || '',
        state: p.state || '',
        error: p.error || '',
        error_description: p.error_description || p.error_reason || ''
      };
      var done = false;
      function finish() {
        if (done) return; done = true;
        try { if (window.opener) window.opener.postMessage(payload, window.location.origin); } catch (e) {}
        // Give the opener a beat to receive the message, then close.
        setTimeout(function () { try { window.close(); } catch (e) {} }, 250);
      }
      if (payload.error) {
        document.getElementById('spin').style.display = 'none';
        document.getElementById('title').textContent = 'Sign-in cancelled';
        document.getElementById('title').className = 'err';
        document.getElementById('msg').textContent =
          (payload.error_description || payload.error) + ' — you can close this window.';
      } else if (!payload.code) {
        document.getElementById('spin').style.display = 'none';
        document.getElementById('title').textContent = 'No authorization code received';
        document.getElementById('title').className = 'err';
        document.getElementById('msg').textContent = 'Please close this window and try connecting again.';
      }
      finish();
    })();
  </script>
</body>
</html>
