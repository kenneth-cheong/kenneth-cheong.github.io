name: SaaS CI

# Gate changes to the SaaS app: run the backend test suite and a frontend build
# on every PR and on pushes to main. Node 20 matches the Lambda runtime.
on:
  pull_request:
    paths: ['saas/**', '.github/workflows/saas.yml']
  push:
    branches: [main]
    paths: ['saas/**', '.github/workflows/saas.yml']

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas/backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: saas/backend/package-lock.json
      - run: npm ci
      - run: npm test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas/frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: saas/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
