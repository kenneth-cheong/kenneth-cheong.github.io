        function generateAutomationSentence(auto, board) {
            const hi = t => `<b style="color:var(--primary-blue)">${t}</b>`;
            const col = id => board.columns.find(c => c.id === id)?.title || id;
            const grp = id => board.groups.find(g => g.id === id)?.name || 'Unknown Group';
            const st  = v  => state.statusOptions[v]?.label || v;
            let trigger = '';
            switch (auto.triggerType) {
                case 'status_change':   trigger = `When ${hi(col(auto.triggerCol))} changes to ${hi(st(auto.triggerValue))}`; break;
                case 'person_assigned': trigger = `When ${hi(col(auto.triggerCol))} is assigned`; break;
                case 'date_arrived':    trigger = `When ${hi(col(auto.triggerCol))} arrives`; break;
                case 'number_reaches':  trigger = `When ${hi(col(auto.triggerCol))} ${auto.operator==='gte'?'≥':'≤'} ${hi(auto.triggerValue)}`; break;
                case 'percentage_100':  trigger = `When ${hi(col(auto.triggerCol))} reaches ${hi('100%')}`; break;
                case 'item_created':    trigger = `When an item is ${hi('created')}`; break;
                case 'text_contains':   trigger = `When ${hi(col(auto.triggerCol))} contains ${hi('"'+(auto.triggerValue||'')+'"')}`; break;
                default: trigger = 'When triggered';
            }
            let action = '';
            switch (auto.actionType) {
                case 'move_to_group': action = `move item to ${hi(grp(auto.actionGroupId))}`; break;
                case 'set_status':    action = `set ${hi(col(auto.actionCol))} to ${hi(st(auto.actionValue))}`; break;
                case 'notify':        action = `post update: ${hi('"'+(auto.actionMessage||'Automated update')+'"')}`; break;
                case 'assign_person': action = `assign ${hi(col(auto.actionCol))} to ${hi(auto.actionValue==='current'?'creator':auto.actionValue)}`; break;
                default: action = 'take action';
            }
            return `${trigger}, then ${action}`;
        }

        let pendingAutomation = null;
        let builderStep = 1;

        function openAddAutomation() {
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            pendingAutomation = { triggerType: null, actionType: null };
            builderStep = 1;
            renderBuilderStep(board);
            document.getElementById('add-automation-modal').classList.add('show');
        }

        function renderBuilderStep(board) {
            const container = document.getElementById('automation-builder-sentence');
            if (builderStep === 1) {
                container.innerHTML = `
                    <p style="color:var(--text-muted);font-size:13px;margin-bottom:15px;"><b>Step 1 of 2</b> — Choose a trigger</p>
                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
                        ${TRIGGER_TYPES.map(t => `<div class="automation-type-card ${pendingAutomation.triggerType===t.key?'selected':''}" onclick="selectTriggerType('${t.key}')"><i data-lucide="${t.icon}" size="22"></i><span>${t.label}</span></div>`).join('')}
                    </div>
                    ${pendingAutomation.triggerType ? renderTriggerConfig(board) : ''}
                    <div style="display:flex;justify-content:flex-end;margin-top:20px;">
                        <button class="btn-save" onclick="goToStep2()" ${pendingAutomation.triggerType?'':'disabled'}>Next: Choose Action →</button>
                    </div>`;
            } else {
                container.innerHTML = `
                    <p style="color:var(--text-muted);font-size:13px;margin-bottom:5px;"><b>Step 2 of 2</b> — Choose an action</p>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;">
                        ${ACTION_TYPES.map(a => `<div class="automation-type-card ${pendingAutomation.actionType===a.key?'selected':''}" onclick="selectActionType('${a.key}')"><i data-lucide="${a.icon}" size="22"></i><span>${a.label}</span></div>`).join('')}
                    </div>
                    ${pendingAutomation.actionType ? renderActionConfig(board) : ''}
                    <div style="display:flex;justify-content:space-between;margin-top:20px;">
                        <button class="btn-cancel" onclick="builderStep=1;renderBuilderStep(state.boards.find(b=>b.id===state.activeBoardId))">← Back</button>
                        <button class="btn-save" onclick="saveAutomation()" ${pendingAutomation.actionType?'':'disabled'}>Create Automation</button>
                    </div>`;
            }
            lucide.createIcons({ nameAttr: 'data-lucide', container });
        }

        function renderTriggerConfig(board) {
            const t = pendingAutomation.triggerType;
            const sel = (arr, key, onchange) => arr.map(x => `<option value="${x.id||x.key}" ${pendingAutomation[key]===(x.id||x.key)?'selected':''}>${x.label||x.title||x.name}</option>`).join('');
            const wrap = (label, inner) => `<label style="font-size:13px;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">${label}<select onchange="${inner}" style="background:var(--bg-main);color:var(--text-main);border:1px solid var(--border-color);border-radius:4px;padding:6px;">${arguments[1]}</select></label>`;

            let html = `<div style="margin-top:15px;padding:15px;background:var(--bg-surface);border-radius:8px;border:1px solid var(--border-color);">`;
            const inp = (lbl, key, type='text', placeholder='') => `<label style="font-size:13px;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">${lbl}<input type="${type}" value="${pendingAutomation[key]||''}" placeholder="${placeholder}" onchange="pendingAutomation.${key}=this.value" style="background:var(--bg-main);color:var(--text-main);border:1px solid var(--border-color);border-radius:4px;padding:6px;"></label>`;
            const ddl = (lbl, key, options) => `<label style="font-size:13px;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">${lbl}<select onchange="pendingAutomation.${key}=this.value" style="background:var(--bg-main);color:var(--text-main);border:1px solid var(--border-color);border-radius:4px;padding:6px;">${options}</select></label>`;
            const cols = (...types) => board.columns.filter(c=>types.includes(c.type)).map(c=>`<option value="${c.id}" ${pendingAutomation.triggerCol===c.id?'selected':''}>${c.title}</option>`).join('');

            if (t === 'status_change') {
                const sCols = board.columns.filter(c=>c.type==='status');
                if(!pendingAutomation.triggerCol && sCols[0]) pendingAutomation.triggerCol=sCols[0].id;
                html += ddl('Column','triggerCol',cols('status'));
                html += ddl('Changes to','triggerValue', Object.keys(state.statusOptions).filter(k=>k!=='empty').map(k=>`<option value="${k}" ${pendingAutomation.triggerValue===k?'selected':''}>${state.statusOptions[k].label}</option>`).join(''));
            } else if (t === 'person_assigned') {
                const pCols = board.columns.filter(c=>c.type==='person');
                if(!pendingAutomation.triggerCol && pCols[0]) pendingAutomation.triggerCol=pCols[0].id;
                html += ddl('Person column','triggerCol',cols('person'));
            } else if (t === 'date_arrived') {
                const dCols = board.columns.filter(c=>c.type==='date');
                if(!pendingAutomation.triggerCol && dCols[0]) pendingAutomation.triggerCol=dCols[0].id;
                html += ddl('Date column','triggerCol',cols('date'));
            } else if (t === 'number_reaches') {
                const nCols = board.columns.filter(c=>['number','currency','percentage'].includes(c.type));
                if(!pendingAutomation.triggerCol && nCols[0]) pendingAutomation.triggerCol=nCols[0].id;
                if(!pendingAutomation.operator) pendingAutomation.operator='gte';
                html += ddl('Column','triggerCol',cols('number','currency','percentage'));
                html += ddl('Operator','operator',`<option value="gte" ${pendingAutomation.operator==='gte'?'selected':''}>≥ at least</option><option value="lte" ${pendingAutomation.operator==='lte'?'selected':''}>≤ at most</option>`);
                html += inp('Value','triggerValue','number','0');
            } else if (t === 'percentage_100') {
                const pCols = board.columns.filter(c=>c.type==='percentage');
                if(!pendingAutomation.triggerCol && pCols[0]) pendingAutomation.triggerCol=pCols[0].id;
                html += ddl('Percentage column','triggerCol',cols('percentage'));
            } else if (t === 'item_created') {
                html += `<p style="font-size:13px;color:var(--text-muted);margin:0;">Fires when any new item is added to this board.</p>`;
            } else if (t === 'text_contains') {
                const tCols = board.columns.filter(c=>c.type==='text');
                if(!pendingAutomation.triggerCol && tCols[0]) pendingAutomation.triggerCol=tCols[0].id;
                html += ddl('Text column','triggerCol',cols('text'));
                html += inp('Keyword','triggerValue','text','e.g. urgent');
            }
            return html + '</div>';
        }

        function renderActionConfig(board) {
            const a = pendingAutomation.actionType;
            const ddl = (lbl, key, options) => `<label style="font-size:13px;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">${lbl}<select onchange="pendingAutomation.${key}=this.value" style="background:var(--bg-main);color:var(--text-main);border:1px solid var(--border-color);border-radius:4px;padding:6px;">${options}</select></label>`;
            const inp = (lbl, key) => `<label style="font-size:13px;display:flex;flex-direction:column;gap:6px;margin-bottom:10px;">${lbl}<input type="text" value="${pendingAutomation[key]||''}" placeholder="e.g. This needs attention!" onchange="pendingAutomation.${key}=this.value" style="background:var(--bg-main);color:var(--text-main);border:1px solid var(--border-color);border-radius:4px;padding:6px;"></label>`;
            let html = `<div style="margin-top:15px;padding:15px;background:var(--bg-surface);border-radius:8px;border:1px solid var(--border-color);">`;
            if (a === 'move_to_group') {
                if(!pendingAutomation.actionGroupId) pendingAutomation.actionGroupId=board.groups[0]?.id;
                html += ddl('Destination group','actionGroupId',board.groups.map(g=>`<option value="${g.id}" ${pendingAutomation.actionGroupId===g.id?'selected':''}>${g.name}</option>`).join(''));
            } else if (a === 'set_status') {
                const sCols=board.columns.filter(c=>c.type==='status');
                if(!pendingAutomation.actionCol&&sCols[0]) pendingAutomation.actionCol=sCols[0].id;
                html += ddl('Status column','actionCol',sCols.map(c=>`<option value="${c.id}" ${pendingAutomation.actionCol===c.id?'selected':''}>${c.title}</option>`).join(''));
                html += ddl('Set to','actionValue',Object.keys(state.statusOptions).filter(k=>k!=='empty').map(k=>`<option value="${k}" ${pendingAutomation.actionValue===k?'selected':''}>${state.statusOptions[k].label}</option>`).join(''));
            } else if (a === 'notify') {
                html += inp('Update message','actionMessage');
            } else if (a === 'assign_person') {
                const pCols=board.columns.filter(c=>c.type==='person');
                if(!pendingAutomation.actionCol&&pCols[0]) pendingAutomation.actionCol=pCols[0].id;
                html += ddl('Person column','actionCol',pCols.map(c=>`<option value="${c.id}" ${pendingAutomation.actionCol===c.id?'selected':''}>${c.title}</option>`).join(''));
                html += ddl('Assign to','actionValue',`<option value="current">Current user (creator)</option>`);
            }
            return html + '</div>';
        }

        function selectTriggerType(key) {
            pendingAutomation = { triggerType: key, actionType: pendingAutomation?.actionType || null };
            renderBuilderStep(state.boards.find(b => b.id === state.activeBoardId));
        }
        function selectActionType(key) {
            pendingAutomation.actionType = key;
            pendingAutomation.actionGroupId = null;
            pendingAutomation.actionCol = null;
            pendingAutomation.actionValue = null;
            pendingAutomation.actionMessage = null;
            renderBuilderStep(state.boards.find(b => b.id === state.activeBoardId));
        }
        function goToStep2() {
            if (!pendingAutomation.triggerType) return;
            builderStep = 2;
            renderBuilderStep(state.boards.find(b => b.id === state.activeBoardId));
        }
        function saveAutomation() {
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board || !pendingAutomation.triggerType || !pendingAutomation.actionType) return;
            if (!board.automations) board.automations = [];
            board.automations.push({ id: 'auto_' + Date.now(), ...pendingAutomation, active: true });
            closeAddAutomation();
            renderAutomationList(board);
            queueCloudSync();
        }
        function closeAddAutomation() {
            document.getElementById('add-automation-modal').classList.remove('show');
            pendingAutomation = null;
            builderStep = 1;
        }
        function toggleAutomation(boardId, autoId, active) {
            const board = state.boards.find(b => b.id === boardId);
            const auto = board?.automations?.find(a => a.id === autoId);
            if (auto) { auto.active = active; queueCloudSync(); }
        }
        function deleteAutomation(boardId, autoId) {
            const board = state.boards.find(b => b.id === boardId);
            if (board?.automations) {
                board.automations = board.automations.filter(a => a.id !== autoId);
                renderAutomationList(board);
                queueCloudSync();
            }
        }

        function runAutomations(item, board, eventType) {
            if (!board?.automations?.length) return;
            board.automations.forEach(auto => {
                if (!auto.active || auto.triggerType !== eventType) return;
                let triggered = false;
                if (eventType === 'status_change')   triggered = item.values[auto.triggerCol] === auto.triggerValue;
                else if (eventType === 'person_assigned') triggered = !!item.values[auto.triggerCol];
                else if (eventType === 'number_reaches') { const v = parseFloat(item.values[auto.triggerCol]); triggered = auto.operator === 'gte' ? v >= parseFloat(auto.triggerValue) : v <= parseFloat(auto.triggerValue); }
                else if (eventType === 'percentage_100') triggered = parseFloat(item.values[auto.triggerCol]) >= 100;
                else if (eventType === 'item_created')  triggered = true;
                else if (eventType === 'text_contains') triggered = (item.values[auto.triggerCol]||'').toLowerCase().includes((auto.triggerValue||'').toLowerCase());
                if (!triggered) return;
                if (auto.actionType === 'move_to_group') {
                    const currentGroup = board.groups.find(g => g.items.some(i => i.id === item.id));
                    const targetGroup  = board.groups.find(g => g.id === auto.actionGroupId);
                    if (currentGroup && targetGroup && currentGroup.id !== targetGroup.id) {
                        const idx = currentGroup.items.findIndex(i => i.id === item.id);
                        targetGroup.items.push(currentGroup.items.splice(idx, 1)[0]);
                        showToast(`⚡ Moved "${item.name}" to ${targetGroup.name}`);
                    }
                } else if (auto.actionType === 'set_status') {
                    item.values[auto.actionCol] = auto.actionValue;
                } else if (auto.actionType === 'notify') {
                    if (!item.updates) item.updates = [];
                    item.updates.push({ id: 'auto_up_' + Date.now(), text: `⚡ ${auto.actionMessage || 'Automated update'}`, author: 'system', authorName: 'Automation', date: new Date().toISOString(), replies: [], reactions: {}, attachments: [] });
                } else if (auto.actionType === 'assign_person') {
                    item.values[auto.actionCol] = auto.actionValue === 'current' ? USER_ID : auto.actionValue;
                }
            });
        }

        function checkDateAutomations() {
            const today = new Date().toISOString().split('T')[0];
            state.boards.forEach(board => {
                const dateAutos = (board.automations||[]).filter(a => a.active && a.triggerType === 'date_arrived');
                if (!dateAutos.length) return;
                board.groups.forEach(group => group.items.forEach(item => {
                    const startDate = (item.values[dateAutos[0]?.triggerCol]||'').split(',')[0];
                    if (startDate === today) runAutomations(item, board, 'date_arrived');
                }));
            });
        }


                function handleColumnNameInput(value) {
            const typeSelect = document.getElementById('new-column-type');
            const lower = value.toLowerCase();
            if (lower.includes('last update') || lower.includes('updated')) {
                typeSelect.value = 'last-updated';
            } else if (lower.includes('file') || lower.includes('attachment') || lower.includes('image')) {
                typeSelect.value = 'attachment';
            }
        }

        function saveNewColumn() {
            if(!modalContext) return;
            const name = document.getElementById('new-column-name').value.trim();
            const type = document.getElementById('new-column-type').value;
            if(!name) return;
            
            const board = state.boards.find(b => b.id === modalContext.boardId);
            if(board) {
                const colId = 'col_' + Date.now();
                board.columns.push({ id: colId, title: name, type });
                board.groups.forEach(g => {
                    g.items.forEach(i => {
                        if (type === 'last-updated') {
                            i.values[colId] = JSON.stringify({ userId: USER_ID, userName: USER_NAME, date: new Date().toISOString() });
                        } else {
                            i.values[colId] = type === 'status' ? 'empty' : '';
                        }
                    });
                });
                renderActiveBoard();
                queueCloudSync();
            }
            closeAddColumnModal();
        }
        function renameColumn(boardId, colId) {
            const board = state.boards.find(b => b.id === boardId);
            if(!board) return;
            const col = board.columns.find(c => c.id === colId);
            if(!col) return;
            const newName = prompt("Rename column:", col.title);
            if(newName && newName !== col.title) {
                col.title = newName;
                renderActiveBoard();
                queueCloudSync();
            }
        }
        function deleteColumn(boardId, colId) {
            if(!confirm("Are you sure you want to delete this column?")) return;
            const board = state.boards.find(b => b.id === boardId);
            if(!board) return;
            board.columns = board.columns.filter(c => c.id !== colId);
            board.groups.forEach(g => {
                g.items.forEach(i => {
                    delete i.values[colId];
                });
            });
            renderActiveBoard();
            queueCloudSync();
        }

        function duplicateColumn(boardId, colId) {
            const board = state.boards.find(b => b.id === boardId);
            if(board) {
                const colIndex = board.columns.findIndex(c => c.id === colId);
                if(colIndex > -1) {
                    const original = board.columns[colIndex];
                    const newCol = JSON.parse(JSON.stringify(original));
                    newCol.id = 'col_' + Date.now();
                    newCol.title = newCol.title + ' (copy)';
                    
                    // Copy values for all items
                    board.groups.forEach(group => {
                        group.items.forEach(item => {
                            if(item.values[colId] !== undefined) {
                                item.values[newCol.id] = item.values[colId];
                            }
                        });
                    });
                    
                    board.columns.splice(colIndex + 1, 0, newCol);
                    renderActiveBoard();
                    queueCloudSync();
                }
            }
        }

        // --- Groups ---
        function deleteGroup(boardId, groupId) {
            if(!confirm("Are you sure you want to delete this group?")) return;
            const board = state.boards.find(b => b.id === boardId);
            if(board) {
                board.groups = board.groups.filter(g => g.id !== groupId);
                renderActiveBoard();
                queueCloudSync();
            }
        }
        function changeGroupColor(boardId, groupId) {
            const input = document.createElement('input');
            input.type = 'color';
            input.onchange = (e) => {
                const color = e.target.value;
                const board = state.boards.find(b => b.id === boardId);
                if(board) {
                    const group = board.groups.find(g => g.id === groupId);
                    if(group) {
                        group.color = color;
                        renderActiveBoard();
                        queueCloudSync();
                    }
                }
            };
            input.click();
        }

        function duplicateGroup(boardId, groupId) {
            const board = state.boards.find(b => b.id === boardId);
            if(board) {
                const groupIndex = board.groups.findIndex(g => g.id === groupId);
                if(groupIndex > -1) {
                    const original = board.groups[groupIndex];
                    const clone = JSON.parse(JSON.stringify(original));
                    clone.id = 'group_' + Date.now();
                    clone.name = clone.name + ' (copy)';
                    clone.items.forEach(i => {
                        i.id = 'item_' + Math.random().toString(36).substr(2, 9);
                        if(i.updates) {
                            i.updates.forEach(up => {
                                up.id = 'up_' + Math.random().toString(36).substr(2, 9);
                                if (up.replies) {
                                    up.replies.forEach(rep => {
                                        rep.id = 'rep_' + Math.random().toString(36).substr(2, 9);
                                    });
                                }
                            });
                        }
                    });
                    board.groups.splice(groupIndex + 1, 0, clone);
                    renderActiveBoard();
                    queueCloudSync();
                }
            }
        }

        // --- Sorting ---
        let currentSort = { boardId: null, groupId: null, colId: null, asc: true };
        function sortBoard(boardId, groupId, colId) {
            const board = state.boards.find(b => b.id === boardId);
            if(!board) return;
            const group = board.groups.find(g => g.id === groupId);
            if(!group) return;

            if (currentSort.boardId === boardId && currentSort.groupId === groupId && currentSort.colId === colId) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort = { boardId, groupId, colId, asc: true };
            }

            group.items.sort((a, b) => {
                let valA = colId === 'name' ? a.name : (a.values[colId] || '');
                let valB = colId === 'name' ? b.name : (b.values[colId] || '');
                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });
            renderActiveBoard();
            queueCloudSync();
        }

        // --- Updates Modal ---

            document.getElementById('updates-modal').classList.add('show');

                            </button>
                        </div>
                        
                        ${repliesHtml ? `<div class="reply-box">${repliesHtml}</div>` : ''}
                        
                        <div class="reply-input-area" id="reply-input-${up.id}">
                            <div style="display:flex; gap:10px;">
                                <input type="text" id="reply-text-${up.id}" placeholder="Write a reply..." onkeydown="if(event.key === 'Enter') postReply('${item.id}', '${up.id}')" style="flex-grow:1; background:var(--bg-main); border:1px solid var(--border-color); color:var(--text-main); padding:8px; border-radius:4px; outline:none;">
                                <button class="btn-save" onclick="postReply('${item.id}', '${up.id}')">Reply</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            lucide.createIcons();
        }

        function toggleReplyInput(updateId) {
            const el = document.getElementById(`reply-input-${updateId}`);
            if(el) el.classList.toggle('show');
        }

        function toggleReaction(itemId, updateId, emoji) {
            const board = state.boards.find(b => b.id === currentUpdatesItem.boardId);
            const group = board?.groups.find(g => g.id === currentUpdatesItem.groupId);
            const item = group?.items.find(i => i.id === itemId);
            if(item) {
                const up = item.updates.find(u => u.id === updateId);
                if(up) {
                    if(!up.reactions) up.reactions = {};
                    
                    // Handle legacy numeric counts
                    if (up.reactions[emoji] && !Array.isArray(up.reactions[emoji])) {
                        up.reactions[emoji] = []; // Reset legacy
                    }
                    
                    if(!up.reactions[emoji]) up.reactions[emoji] = [];
                    
                    const userIdx = up.reactions[emoji].findIndex(u => u.id === USER_ID);
                    if(userIdx > -1) {
                        up.reactions[emoji].splice(userIdx, 1);
                        if(up.reactions[emoji].length === 0) delete up.reactions[emoji];
                    } else {
                        up.reactions[emoji].push({ id: USER_ID, name: USER_NAME });
                    }
                    
                    renderUpdatesList(item);
                    queueCloudSync();
                }
            }
        }

        function showEmojiPicker(event, itemId, updateId) {
            const existing = document.getElementById('emoji-picker');
            if(existing) existing.remove();
            
            const picker = document.createElement('div');
            picker.id = 'emoji-picker';
            picker.className = 'emoji-picker';
            picker.style.left = event.clientX + 'px';
            picker.style.top = (event.clientY - 45) + 'px';
            
            const emojis = ['👍', '❤️', '😂', '😮', '😢', '🔥', '👏'];
            emojis.forEach(e => {
                const btn = document.createElement('button');
                btn.innerText = e;
                btn.onclick = (ev) => {
                    ev.stopPropagation();
                    toggleReaction(itemId, updateId, e);
                    picker.remove();
                };
                picker.appendChild(btn);
            });
            
            document.body.appendChild(picker);
            
            const hidePicker = (e) => {
                if(!picker.contains(e.target)) {
                    picker.remove();
                    document.removeEventListener('mousedown', hidePicker);
                }
            };
            setTimeout(() => document.addEventListener('mousedown', hidePicker), 10);
        }

        function postReply(itemId, updateId) {
            const input = document.getElementById(`reply-text-${updateId}`);
            const text = input ? input.value.trim() : '';
            if(!text) return;

            const board = state.boards.find(b => b.id === currentUpdatesItem.boardId);
            const group = board?.groups.find(g => g.id === currentUpdatesItem.groupId);
            const item = group?.items.find(i => i.id === itemId);
            if(item) {
                const up = item.updates.find(u => u.id === updateId);
                if(up) {
                    if(!up.replies) up.replies = [];
                    up.replies.push({
                        id: 'rep_' + Date.now(),
                        text: text,
                        author: USER_ID,
                        date: new Date().toISOString()
                    });
                    renderUpdatesList(item);
                    queueCloudSync();
                }
            }
        }
        function postUpdate() {
            if(!currentUpdatesItem) return;
            const text = document.getElementById('new-update-input').value.trim();
            if(!text) return;

            const board = state.boards.find(b => b.id === currentUpdatesItem.boardId);
            const group = board?.groups.find(g => g.id === currentUpdatesItem.groupId);
            const item = group?.items.find(i => i.id === currentUpdatesItem.itemId);
            
            if(item) {
                if(!item.updates) item.updates = [];
                item.updates.push({
                    id: 'up_' + Date.now(),
                    text: text,
                    author: USER_ID,
                    authorName: USER_NAME,
                    date: new Date().toISOString(),
                    replies: [],
                    reactions: {},
                    attachments: [...updateAttachments]
                });
                markLastUpdated(item);
                document.getElementById('new-update-input').value = '';
                updateAttachments = [];
                renderUpdateAttachmentsPreview();
                renderUpdatesList(item);
                renderActiveBoard(); // to update badge
                queueCloudSync();
            }
        }

        let updateAttachments = [];
        function handleUpdateFiles(files) {
            for(let file of files) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    updateAttachments.push({ name: file.name, type: file.type, data: e.target.result });
                    renderUpdateAttachmentsPreview();
                };
                reader.readAsDataURL(file);
            }
        }

        function handleUpdatePaste(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let item of items) {
                if (item.type.indexOf("image") !== -1) {
                    const blob = item.getAsFile();
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        updateAttachments.push({ name: 'pasted_image_' + Date.now() + '.png', type: 'image/png', data: e.target.result });
                        renderUpdateAttachmentsPreview();
                    };
                    reader.readAsDataURL(blob);
                }
            }
        }

        function renderUpdateAttachmentsPreview() {
            const container = document.getElementById('update-attachments-preview');
            if(!container) return;
            container.innerHTML = updateAttachments.map((f, index) => `
                <div style="position:relative; width:40px; height:40px; border:1px solid var(--border-color); border-radius:4px; overflow:hidden;">
                    ${f.type.startsWith('image/') ? `<img src="${f.data}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"><i data-lucide="file" size="16"></i></div>`}
                    <div style="position:absolute; top:0; right:0; background:rgba(0,0,0,0.5); color:white; cursor:pointer; padding:2px;" onclick="updateAttachments.splice(${index}, 1); renderUpdateAttachmentsPreview();"><i data-lucide="x" size="10"></i></div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- Column File Handling ---
        function triggerAttachmentUpload(boardId, groupId, itemId, colId) {
            document.getElementById(`upload-${itemId}-${colId}`).click();
        }

        function handleColumnFileUpload(input, boardId, groupId, itemId, colId) {
            const file = input.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const board = state.boards.find(b => b.id === boardId);
                if(board) {
                    const group = board.groups.find(g => g.id === groupId);
                    if(group) {
                        const item = group.items.find(i => i.id === itemId);
                        if(item) {
                            const currentFiles = item.values[colId] ? JSON.parse(item.values[colId]) : [];
                            currentFiles.push({ name: file.name, type: file.type, data: e.target.result });
                            item.values[colId] = JSON.stringify(currentFiles);
                            markLastUpdated(item);
                            renderActiveBoard();
                            queueCloudSync();
                        }
                    }
                }
            };
            reader.readAsDataURL(file);
        }

        // --- Preview Modal ---
        function openPreview(data, type, name, context = null) {
            const modal = document.getElementById('preview-modal');
            const content = document.getElementById('preview-content');
            const title = document.getElementById('preview-filename');
            const renameBtn = document.getElementById('preview-rename-btn');
            const downloadBtn = document.getElementById('preview-download-btn');
            const deleteBtn = document.getElementById('preview-delete-btn');
            const renameContainer = document.getElementById('preview-rename-input-container');
            const renameInput = document.getElementById('preview-rename-input');
            const renameSave = document.getElementById('preview-rename-save');
            
            title.style.display = 'block';
            title.innerText = name;
            renameContainer.style.display = 'none';
            content.innerHTML = '';
            
            if(type.startsWith('image/')) {
                content.innerHTML = `<img src="${data}" style="max-width:100%; max-height:100%; border-radius:4px; box-shadow:0 10px 30px rgba(0,0,0,0.5); object-fit:contain;">`;
            } else {
                content.innerHTML = `
                    <div style="background:var(--bg-surface); padding:40px; border-radius:8px; text-align:center; color:var(--text-main); border:1px solid var(--border-color);">
                        <i data-lucide="file" size="64" style="margin-bottom:20px; color:var(--text-muted);"></i>
                        <h3>${name}</h3>
                        <p style="color:var(--text-muted); margin-top:10px;">Preview not available for this file type.</p>
                    </div>
                `;
            }

            renameBtn.onclick = (e) => {
                e.stopPropagation();
                title.style.display = 'none';
                renameContainer.style.display = 'flex';
                renameInput.value = name;
                renameInput.focus();
            };

            renameSave.onclick = (e) => {
                e.stopPropagation();
                const newName = renameInput.value.trim();
                if(newName && newName !== name) {
                    renameAttachment(context, newName);
                    name = newName;
                    title.innerText = name;
                }
                title.style.display = 'block';
                renameContainer.style.display = 'none';
            };

            downloadBtn.onclick = (e) => {
                e.stopPropagation();
                const a = document.createElement('a');
                a.href = data;
                a.download = name;
                a.click();
            };

            if(context) {
                deleteBtn.style.display = 'flex';
                renameBtn.style.display = 'flex';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm('Delete this attachment?')) {
                        deleteAttachment(context);
                        closePreviewModal();
                    }
                };
            } else {
                deleteBtn.style.display = 'none';
                renameBtn.style.display = 'none';
            }
            
            modal.classList.add('show');
            lucide.createIcons();
        }

        function deleteAttachment(ctx) {
            const board = state.boards.find(b => b.id === ctx.boardId || (ctx.type === 'update' && state.boards.some(bo => bo.groups.some(g => g.items.some(i => i.id === ctx.itemId)))));
            
            if (ctx.type === 'column') {
                const group = board.groups.find(g => g.id === ctx.groupId);
                const item = group.items.find(i => i.id === ctx.itemId);
                const files = JSON.parse(item.values[ctx.colId]);
                files.splice(ctx.index, 1);
                item.values[ctx.colId] = JSON.stringify(files);
                markLastUpdated(item);
                renderActiveBoard();
            } else if (ctx.type === 'update') {
                for (let b of state.boards) {
                    for (let g of b.groups) {
                        const item = g.items.find(i => i.id === ctx.itemId);
                        if (item) {
                            const update = item.updates.find(u => u.id === ctx.updateId);
                            if (update && update.attachments) {
                                update.attachments.splice(ctx.index, 1);
                                markLastUpdated(item);
                                renderUpdatesList(item);
                                break;
                            }
                        }
                    }
                }
            }
            queueCloudSync();
        }

        function renameAttachment(ctx, newName) {
            const board = state.boards.find(b => b.id === ctx.boardId || (ctx.type === 'update' && state.boards.some(bo => bo.groups.some(g => g.items.some(i => i.id === ctx.itemId)))));
            
            if (ctx.type === 'column') {
                const group = board.groups.find(g => g.id === ctx.groupId);
                const item = group.items.find(i => i.id === ctx.itemId);
                const files = JSON.parse(item.values[ctx.colId]);
                files[ctx.index].name = newName;
                item.values[ctx.colId] = JSON.stringify(files);
                markLastUpdated(item);
                renderActiveBoard();
            } else if (ctx.type === 'update') {
                for (let b of state.boards) {
                    for (let g of b.groups) {
                        const item = g.items.find(i => i.id === ctx.itemId);
                        if (item) {
                            const update = item.updates.find(u => u.id === ctx.updateId);
                            if (update && update.attachments) {
                                update.attachments[ctx.index].name = newName;
                                markLastUpdated(item);
                                renderUpdatesList(item);
                                break;
                            }
                        }
                    }
                }
            }
            queueCloudSync();
        }

        function closePreviewModal() {
            document.getElementById('preview-modal').classList.remove('show');
        }

        // --- Tooltip Logic ---
        let tooltipEl = null;
        function showTooltip(event, text) {
            if (!tooltipEl) {
                tooltipEl = document.createElement('div');
                tooltipEl.className = 'custom-tooltip';
                document.body.appendChild(tooltipEl);
            }
            tooltipEl.innerText = text;
            tooltipEl.style.display = 'block';
            
            const rect = event.target.getBoundingClientRect();
            const tooltipRect = tooltipEl.getBoundingClientRect();
            
            tooltipEl.style.left = (rect.left + rect.width/2 - tooltipRect.width/2) + 'px';
            tooltipEl.style.top = (rect.top - tooltipRect.height - 8) + 'px';
        }

        function hideTooltip() {
            if (tooltipEl) tooltipEl.style.display = 'none';
        }

        // --- Column Resizing ---
        let resizeData = null;
        function initResize(e, boardId, colId) {
            e.stopPropagation();
            e.preventDefault();
            const th = e.target.parentElement;
            resizeData = {
                boardId,
                colId,
                startOffset: th.offsetWidth - e.pageX,
                th: th
            };
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', stopResize);
            e.target.classList.add('resizing');
        }

        function handleMouseMove(e) {
            if (!resizeData) return;
            const newWidth = resizeData.startOffset + e.pageX;
            if (newWidth > 50) {
                resizeData.th.style.width = newWidth + 'px';
                // Find and update other tables in the same board (groups)
                const board = state.boards.find(b => b.id === resizeData.boardId);
                if (board) {
                    if (!board.columnWidths) board.columnWidths = {};
                    board.columnWidths[resizeData.colId] = newWidth;
                }
            }
        }

        function stopResize() {
            if (resizeData) {
                document.querySelectorAll('.resizer.resizing').forEach(el => el.classList.remove('resizing'));
                resizeData = null;
                document.removeEventListener('mousemove', handleMouseMove);
                document.removeEventListener('mouseup', stopResize);
                renderActiveBoard(); // Re-render to sync all tables in the board
                queueCloudSync();
            }
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', () => {
            document.querySelectorAll('.status-dropdown.show, .person-dropdown.show, .dropdown-menu.show').forEach(el => {
                el.classList.remove('show');
                const group = el.closest('.group');
                const tr = el.closest('tr');
                const td = el.closest('td');
                if(group) { group.style.zIndex = ''; group.style.position = ''; }
                if(tr) { tr.style.zIndex = ''; tr.style.position = ''; }
                if(td) { td.style.zIndex = ''; }
            });
        });

        // --- Utility ---
        
        function setSyncStatus(status, text) {
            const el = document.getElementById('cloud-sync-status');
            el.className = `cloud-sync ${status}`;
            
            let icon = 'cloud';
            if(status === 'syncing') icon = 'refresh-cw';
            if(status === 'synced') icon = 'cloud-check';
            if(status === 'error') icon = 'cloud-off';
            
            el.innerHTML = `<i data-lucide="${icon}" size="14"></i> <span>${text}</span>`;
            lucide.createIcons();
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            msgEl.innerText = message;
            toast.style.backgroundColor = isError ? 'var(--status-stuck)' : 'var(--bg-surface)';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            const loggedIn = checkGoogleLogin();
            lucide.createIcons();
            fetchBoardsFromCloud();
        });

    </script>
</body>
